<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Coach Pro — Force Athlétique</title>
<style>
:root{
  --p:#A6192E;--ph:#C2273D;--ps:#FBEAEC;
  --a:#FF6635;--as:#FFF0EB;
  --bg:#F4F6F9;--sur:#fff;--bor:#E5E7EB;--bor2:#F3F4F6;
  --t:#1A1A2E;--t2:#6B7280;--t3:#9CA3AF;--ti:#fff;
  --ok:#10B981;--ok2:#ECFDF5;--er:#EF4444;--er2:#FEF2F2;
  --sq:#3B82F6;--sq2:#EFF6FF;--be:#10B981;--be2:#ECFDF5;
  --dl:#F59E0B;--dl2:#FFFBEB;
  --r8:8px;--r12:12px;--r16:16px;--rF:999px;
  --sh:0 1px 3px rgba(166,25,46,.08),0 2px 8px rgba(166,25,46,.06);
  --sh2:0 4px 16px rgba(166,25,46,.14);
}
html[data-theme="dark"]{
  --p:#E5495E;--ph:#F0626F;--ps:rgba(166,25,46,.18);
  --a:#FF7A4D;--as:rgba(255,102,53,.16);
  --bg:#1A1516;--sur:#231C1E;--bor:#352A2C;--bor2:#2A2224;
  --t:#F3EEEE;--t2:#B6A9A7;--t3:#857776;--ti:#fff;
  --ok:#34D399;--ok2:rgba(16,185,129,.16);--er:#F87171;--er2:rgba(239,68,68,.16);
  --sq:#60A5FA;--sq2:rgba(59,130,246,.16);--be:#34D399;--be2:rgba(16,185,129,.16);
  --dl:#FBBF24;--dl2:rgba(245,158,11,.16);
  --sh:0 1px 3px rgba(0,0,0,.45),0 2px 8px rgba(0,0,0,.35);
  --sh2:0 4px 18px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#e8ebf0}
html[data-theme="dark"],html[data-theme="dark"] body{background:#0E0B0C}
#app{max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden;background:var(--bg);box-shadow:0 0 40px rgba(0,0,0,.15)}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);transition:transform .28s cubic-bezier(.4,0,.2,1),opacity .28s;overflow:hidden;will-change:transform}
html[data-theme="dark"] .screen{background:radial-gradient(ellipse 90% 55% at 50% -8%,rgba(166,25,46,.10),transparent 60%) var(--bg)}
html[data-theme="dark"] #app{background:radial-gradient(ellipse 90% 55% at 50% -8%,rgba(166,25,46,.10),transparent 60%) var(--bg)}
.screen.hide{transform:translateX(100%);opacity:0;pointer-events:none}
.screen.hide-back{transform:translateX(-28%);opacity:0;pointer-events:none}
.topbar{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--sur);border-bottom:1px solid var(--bor);flex-shrink:0;min-height:54px}
.tb-back{width:36px;height:36px;border-radius:var(--rF);background:var(--bg);border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;color:var(--p);flex-shrink:0}
.tb-back:hover{background:var(--ps)}
.tb-title{font-size:16px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-action{background:none;border:none;cursor:pointer;font-size:20px;padding:6px;border-radius:var(--r8);color:var(--t2)}
.tb-action:hover{background:var(--bg)}
.tabs{display:flex;background:var(--sur);border-top:1px solid var(--bor);flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;cursor:pointer;border:none;background:none;color:var(--t3);transition:color .15s}
.tab.active{color:var(--p)}
.tab-i{font-size:22px}.tab-l{font-size:10px;font-weight:600;letter-spacing:.3px}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}.scroll::-webkit-scrollbar{width:0}
.pad{padding:16px}.gap{display:flex;flex-direction:column;gap:12px}
h2{font-size:20px;font-weight:700;letter-spacing:-.3px}
h3{font-size:17px;font-weight:700}h4{font-size:15px;font-weight:600}
.sub{font-size:13px;color:var(--t2);line-height:1.5}
.caption{font-size:11px;color:var(--t3);letter-spacing:.3px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--r12);cursor:pointer;font-weight:600;transition:all .15s;white-space:nowrap;font-family:inherit}
.btn:disabled{opacity:.4;pointer-events:none}
.btn-p{background:var(--p);color:#fff;padding:13px 20px;font-size:15px;width:100%;box-shadow:var(--sh)}
.btn-p:hover{background:var(--ph)}
.btn-s{background:var(--ps);color:var(--p);padding:11px 20px;font-size:14px;width:100%;border:1.5px solid var(--p)}
.btn-ghost{background:none;color:var(--p);padding:10px 16px;font-size:14px;cursor:pointer;border:none;font-weight:600;font-family:inherit}
.btn-danger{background:var(--er);color:#fff;padding:11px 20px;font-size:14px;width:100%;border:none;border-radius:var(--r12);cursor:pointer;font-weight:600;font-family:inherit}
.btn-icon{width:34px;height:34px;border-radius:var(--rF);padding:0;font-size:16px;background:var(--bg);border:1px solid var(--bor);cursor:pointer}
.fab{position:absolute;bottom:76px;right:16px;width:54px;height:54px;border-radius:var(--rF);background:var(--p);color:#fff;font-size:28px;box-shadow:var(--sh2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;line-height:1}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:13px;font-weight:600;color:var(--t)}
.inp{background:var(--sur);border:1.5px solid var(--bor);border-radius:var(--r12);padding:11px 14px;font-size:15px;color:var(--t);width:100%;outline:none;transition:border-color .15s;box-shadow:var(--sh);font-family:inherit}
.inp:focus{border-color:var(--p)}.inp.err{border-color:var(--er)}
.err-msg{font-size:12px;color:var(--er);margin-top:2px}
.row2{display:flex;gap:10px}.row2 .field{flex:1}
.card{background:var(--sur);border-radius:var(--r16);padding:16px;box-shadow:var(--sh)}
.card-p{background:var(--p);border-radius:var(--r16);padding:16px;color:#fff}
.card-row{display:flex;gap:10px}.card-row .card{flex:1}
.avatar{border-radius:var(--rF);background:var(--ps);color:var(--p);font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.av-sm{width:42px;height:42px;font-size:15px}.av-lg{width:70px;height:70px;font-size:26px}
.badge{display:inline-flex;align-items:center;border-radius:var(--rF);padding:3px 9px;font-size:11px;font-weight:700;letter-spacing:.3px}
.bd-sq{background:var(--sq2);color:var(--sq)}.bd-be{background:var(--be2);color:var(--be)}
.bd-dl{background:var(--dl2);color:var(--dl)}.bd-p{background:var(--ps);color:var(--p)}
.bd-ok{background:var(--ok2);color:var(--ok)}.bd-a{background:var(--as);color:var(--a)}
.stats{display:flex;gap:0}.stat{text-align:center;flex:1}
.stat-v{font-size:24px;font-weight:800;line-height:1}
.stat-l{font-size:10px;color:var(--t2);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.sdiv{width:1px;background:var(--bor);margin:4px 0}
.records{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rec{background:var(--bg);border-radius:var(--r12);padding:12px;text-align:center}
.rec-full{grid-column:1/-1}.rec-v{font-size:22px;font-weight:800}.rec-l{font-size:11px;color:var(--t2);font-weight:600;margin-top:2px}
.ath-card{background:var(--sur);border-radius:var(--r16);padding:14px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px;cursor:pointer}
.ath-card:active{transform:scale(.98)}
.lifts{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap}
.lt{font-size:12px;font-weight:700}
.blk-card{background:var(--sur);border-radius:var(--r16);box-shadow:var(--sh);overflow:hidden;cursor:pointer}
.blk-hdr{display:flex;align-items:center;gap:10px;padding:14px}
.blk-icon{width:42px;height:42px;border-radius:var(--r12);background:var(--ps);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.wk-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;background:none;width:100%;text-align:left;border:none;border-top:1px solid var(--bor2);font-family:inherit}
.wk-dot{width:28px;height:28px;border-radius:var(--rF);background:var(--p);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wk-chev{margin-left:auto;font-size:11px;color:var(--t3);transition:transform .2s}
.wk-chev.open{transform:rotate(180deg)}
.ses-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--bor2);cursor:pointer;transition:background .1s}
.ses-row:hover{background:var(--bg)}
.ses-tag{width:28px;height:28px;border-radius:var(--r8);background:var(--ps);color:var(--p);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ex-card{background:var(--sur);border-radius:var(--r12);border:1px solid var(--bor);overflow:hidden}
.ex-hdr{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--bor2)}
.ex-fam{border-radius:var(--r8);padding:3px 8px;font-size:11px;font-weight:800;letter-spacing:.3px}
.ex-name{font-size:14px;font-weight:600;flex:1}
.ex-acts{display:flex;gap:4px}
.ex-params{display:flex;gap:0;padding:10px 14px;background:var(--bg)}
.ex-param{text-align:center;flex:1}
.ex-pv{font-size:13px;font-weight:700}.ex-pl{font-size:10px;color:var(--t3);margin-top:1px}
.srchbar{display:flex;align-items:center;gap:8px;background:var(--sur);border-radius:var(--r12);padding:10px 14px;box-shadow:var(--sh);margin:12px 16px 0}
.srchbar input{flex:1;border:none;background:none;font-size:14px;color:var(--t);outline:none;font-family:inherit}
.srchbar input::placeholder{color:var(--t3)}
.stepper{display:flex;align-items:center;justify-content:center;gap:20px}
.step-btn{width:46px;height:46px;border-radius:var(--rF);background:var(--p);color:#fff;border:none;font-size:24px;cursor:pointer;line-height:1}
.step-btn:disabled{opacity:.3}
.step-val{width:70px;height:70px;border-radius:var(--rF);background:var(--ps);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:var(--p)}
.dots{display:flex;justify-content:center;gap:6px;margin-top:10px}
.dot{width:10px;height:10px;border-radius:var(--rF);background:var(--bor);transition:background .15s}
.dot.on{background:var(--p)}.dot.ona{background:var(--a)}
.opl-card{background:var(--sur);border-radius:var(--r12);padding:14px;border:1.5px solid var(--bor);cursor:pointer;transition:all .15s}
.opl-card:hover{border-color:var(--p);background:var(--ps)}
.comp-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bor2)}
.comp-date{font-size:11px;color:var(--t3);min-width:64px}
.comp-meet{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.comp-fed{font-size:11px;color:var(--t3)}
.cl{font-size:12px;font-weight:700}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 24px;text-align:center;gap:10px}
.empty-emoji{font-size:46px}
.tag-pill{display:inline-flex;align-items:center;gap:4px;background:var(--ps);border-radius:var(--rF);padding:4px 12px;font-size:12px;font-weight:600;color:var(--p)}
#wizard{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;z-index:100;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1)}
#wizard.open{transform:translateY(0)}
.wiz-top{background:var(--sur);border-bottom:1px solid var(--bor);flex-shrink:0}
.wiz-prog{display:flex;gap:3px;padding:10px 14px 0}
.wiz-pd{flex:1;height:3px;border-radius:2px;background:var(--bor);transition:background .2s}
.wiz-pd.done{background:var(--p)}
.wiz-hdr{padding:8px 14px 12px;display:flex;align-items:center;gap:8px}
.wiz-slbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.wiz-stitle{font-size:17px;font-weight:700;flex:1}
.wiz-summ{background:var(--ps);padding:7px 14px;font-size:12px;font-weight:600;color:var(--p);border-bottom:1px solid var(--bor)}
.wiz-body{flex:1;overflow-y:auto;padding:16px}.wiz-body::-webkit-scrollbar{width:0}
.wiz-foot{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--sur);border-top:1px solid var(--bor);flex-shrink:0}
.wiz-back-btn{background:none;border:none;font-size:14px;color:var(--t2);cursor:pointer;padding:8px;white-space:nowrap;font-family:inherit}
.fam-cards{display:flex;flex-direction:column;gap:10px}
.fam-card{display:flex;align-items:center;gap:14px;padding:16px;border-radius:var(--r16);border:2px solid var(--bor);cursor:pointer;transition:all .15s;background:var(--sur)}
.fam-card.sel{border-color:var(--p);background:var(--ps)}
.fam-emoji{font-size:32px}
.fam-check{margin-left:auto;font-size:20px;color:var(--p);opacity:0;transition:opacity .15s}
.fam-card.sel .fam-check{opacity:1}
.var-list{display:flex;flex-direction:column;gap:8px}
.var-item{display:flex;align-items:center;padding:13px 14px;border-radius:var(--r12);border:1.5px solid var(--bor);cursor:pointer;transition:all .15s;background:var(--sur)}
.var-item.sel{border-color:var(--p);background:var(--ps)}
.var-name{flex:1;font-size:14px;font-weight:500}
.var-abbr{font-size:12px;color:var(--t3)}
.num-grid{display:flex;flex-wrap:wrap;gap:8px}
.num-btn{width:58px;height:58px;border-radius:var(--r12);border:1.5px solid var(--bor);background:var(--sur);font-size:20px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh)}
.num-btn.sel{background:var(--p);border-color:var(--p);color:#fff}
.reps-row{display:flex;gap:8px}
.reps-btn{flex:1;height:72px;border-radius:var(--r16);border:1.5px solid var(--bor);background:var(--sur);font-size:28px;font-weight:800;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.reps-btn.sel{background:var(--p);border-color:var(--p);color:#fff}
.rpe-row{display:flex;gap:6px}
.rpe-btn{flex:1;padding:14px 0;border-radius:var(--r12);border:1.5px solid var(--bor);background:var(--sur);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;box-shadow:var(--sh)}
.rpe-btn.sel{background:var(--p);border-color:var(--p);color:#fff}
.rpe-info{background:var(--ps);border-radius:var(--r12);padding:12px 16px;text-align:center;margin-top:10px}
.rpe-sel{font-size:18px;font-weight:800;color:var(--p)}
.rest-auto{background:var(--ps);border-radius:var(--r12);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.rest-scs{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.rest-sc{padding:6px 12px;border-radius:var(--rF);border:1px solid var(--bor);background:var(--sur);font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit}
.rest-sc.sel{background:var(--p);color:#fff;border-color:var(--p)}
.pres-row{display:flex;gap:10px}
.pres-btn{flex:1;border-radius:var(--r16);border:2px solid var(--bor);background:var(--sur);padding:16px 10px;cursor:pointer;transition:all .15s;text-align:center;font-family:inherit}
.pres-btn.sel{border-color:var(--p);background:var(--ps)}
.pres-em{font-size:30px;display:block;margin-bottom:6px}
.pres-name{font-size:16px;font-weight:700;color:var(--t)}
.pres-desc{font-size:11px;color:var(--t2);margin-top:3px}
.load-tog{display:flex;background:var(--bor2);border-radius:var(--r12);padding:3px;margin-bottom:14px}
.load-tog-btn{flex:1;padding:8px;text-align:center;border-radius:var(--r8);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--t2);border:none;background:none;font-family:inherit}
.load-tog-btn.sel{background:var(--sur);color:var(--p);box-shadow:var(--sh)}
.load-row{display:flex;align-items:flex-end;gap:10px}
.load-sep{font-size:22px;color:var(--t3);padding-bottom:10px;font-weight:700}
.load-prev{background:var(--ps);border-radius:var(--r12);padding:12px 14px;text-align:center;margin-top:10px;font-size:18px;font-weight:800;color:var(--p)}
.auth-hero{display:flex;flex-direction:column;align-items:center;padding:44px 24px 32px}
.logo-box{width:76px;height:76px;background:var(--p);border-radius:var(--r16);display:flex;align-items:center;justify-content:center;font-size:38px;box-shadow:var(--sh2);margin-bottom:16px}
.toast{position:absolute;bottom:76px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;border-radius:var(--rF);padding:9px 18px;font-size:13px;font-weight:600;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;z-index:200}
.toast.show{opacity:1}
.sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;z-index:150;opacity:0;transition:opacity .2s;pointer-events:none}
.sheet-overlay.show{opacity:1;pointer-events:all}
.sheet{background:var(--sur);border-radius:var(--r16) var(--r16) 0 0;padding:20px;width:100%;transform:translateY(100%);transition:transform .25s}
.sheet-overlay.show .sheet{transform:translateY(0)}
.auth-link-row{display:flex;justify-content:center;align-items:center;gap:4px;margin-top:4px}

/* ── QUICK ENTRY ─────────────────────────────────── */
.qe-wrap{background:var(--sur);border:1.5px solid var(--bor);border-radius:var(--r12);overflow:hidden;box-shadow:var(--sh)}
.qe-wrap:focus-within{border-color:var(--p)}
.qe-search{display:flex;align-items:center;gap:8px;padding:10px 12px}
.qe-search input{flex:1;border:none;background:none;font-size:14px;color:var(--t);outline:none;font-family:inherit}
.qe-search input::placeholder{color:var(--t3)}
.qe-suggest{border-top:1px solid var(--bor2)}
.qe-sug-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;transition:background .1s}
.qe-sug-item:hover,.qe-sug-item.active{background:var(--ps)}
.qe-sug-fam{font-size:10px;font-weight:800;border-radius:4px;padding:2px 6px;letter-spacing:.3px}
.qe-sug-name{font-size:13px;font-weight:500;flex:1}
.qe-sug-abbr{font-size:11px;color:var(--t3)}
.qe-params{display:flex;align-items:center;gap:0;padding:0 12px 10px;flex-wrap:wrap;gap:6px}
.qe-field{display:flex;flex-direction:column;gap:2px}
.qe-field label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}
.qe-field input,.qe-field select{background:var(--bg);border:1px solid var(--bor);border-radius:var(--r8);padding:6px 8px;font-size:14px;font-weight:700;color:var(--t);outline:none;font-family:inherit;width:54px;text-align:center}
.qe-field input:focus,.qe-field select:focus{border-color:var(--p)}
.qe-sep{color:var(--t3);font-weight:700;font-size:15px;padding-top:14px}
.qe-load-chip{display:flex;align-items:center;gap:4px;background:var(--ps);border-radius:var(--r8);padding:4px 8px;font-size:11px;color:var(--p);font-weight:700;cursor:pointer;border:none;font-family:inherit}
.qe-add-btn{background:var(--p);color:#fff;border:none;border-radius:var(--r8);padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;align-self:flex-end;margin-bottom:1px}
.qe-add-btn:disabled{opacity:.35;pointer-events:none}

/* ── INLINE EX ROW ───────────────────────────────── */
.iex-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-top:1px solid var(--bor2);position:relative}
.iex-row:active{background:var(--bg)}
.iex-fam{font-size:9px;font-weight:800;border-radius:4px;padding:2px 5px;letter-spacing:.3px;flex-shrink:0}
.iex-name{font-size:12px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iex-tags{display:flex;gap:4px;align-items:center;flex-shrink:0}
.iex-tag{font-size:11px;font-weight:700;color:var(--t2)}
.iex-tag.load{color:var(--a)}
.iex-acts{display:flex;gap:2px;flex-shrink:0}

<script>
// ── CONSTANTS ────────────────────────────────────────────────────────
const EX={
  S:{lbl:'Squat',em:'🏋️',col:'var(--sq)',bg:'var(--sq2)',
     vars:[{k:'squat_competition',l:'Squat compétition',a:'SQ Comp'},{k:'squat_high_bar',l:'Squat high bar',a:'SQ HB'},{k:'squat_pause',l:'Squat pause',a:'SQ Pause'}]},
  B:{lbl:'Bench',em:'🤜',col:'var(--be)',bg:'var(--be2)',
     vars:[{k:'bench_competition',l:'Bench compétition',a:'BP Comp'},{k:'bench_pause',l:'Bench pause',a:'BP Pause'},{k:'spoto_press',l:'Spoto press',a:'Spoto'},{k:'close_grip_bench',l:'Close grip bench',a:'CG BP'}]},
  D:{lbl:'Deadlift',em:'💪',col:'var(--dl)',bg:'var(--dl2)',
     vars:[{k:'deadlift_competition',l:'Deadlift compétition',a:'DL Comp'},{k:'deadlift_pause',l:'Deadlift pause',a:'DL Pause'},{k:'deadlift_deficit',l:'Deadlift déficit',a:'DL Déf'}]}
};
// Variante "compétition" de chaque mouvement — utilisée pour restreindre le calcul d'E1RM
const COMP_VAR={S:'squat_competition',B:'bench_competition',D:'deadlift_competition'};
const RPE_V=[4,4.5,5,5.5,6,6.5,7,7.5,8,8.5,9,9.5,10];
const RPE_R={4:60,4.5:75,5:90,5.5:120,6:150,6.5:150,7:180,7.5:180,8:210,8.5:240,9:270,9.5:300,10:300};
const REST_SC=[60,90,120,150,180,240];
const WSTEPS=['Famille','Variante','Séries','Répétitions','RPE','Repos','Prescription','Charge','Application'];

// RPE → % du max selon le nombre de répétitions (colonne = reps 1-10)
const RPE_TABLE={
  10:[100,95.5,92.2,89.2,86.3,83.7,81.1,78.6,76.2,73.9],
  9.5:[97.8,93.9,90.7,87.8,85,82.4,79.9,77.4,75.1,72.3],
  9:[95.5,92.2,89.2,86.3,83.7,81.1,78.6,76.2,73.9,70.7],
  8.5:[93.9,90.7,87.8,85,82.4,79.9,77.4,75.1,72.3,69.4],
  8:[92.2,89.2,86.3,83.7,81.1,78.6,76.2,73.9,70.7,68],
  7.5:[90.7,87.8,85,82.4,79.9,77.4,75.1,72.3,69.4,66.7],
  7:[89.2,86.3,83.7,81.1,78.6,76.2,73.9,70.7,68,65.3],
  6.5:[87.8,85,82.4,79.9,77.4,75.1,72.3,69.4,66.7,64],
  6:[86.3,83.8,81.3,78.7,76.2,74,70.8,68,65.4,62.7],
  5.5:[84.9,82.5,80.9,77.5,75,72.9,69.4,66.8,64.1,61.4],
  5:[83.6,81.2,79.6,76.3,73.8,71.8,67.8,65.4,62.8,60],
  4.5:[82.8,80.9,78.7,75.4,72.5,70.5,66.7,64.2,61.7,59],
  4:[81.5,79.5,77.5,74.5,71.5,69.5,68.5,67.5,60.5,58]
};

// % du max de base pour chaque variante (utilisé pour le calcul de charge)
const VAR_PCT={
  squat_competition:100, squat_pause:94, squat_high_bar:93,
  bench_competition:100, bench_pause:94, spoto_press:103.5, close_grip_bench:97.5,
  deadlift_competition:100, deadlift_pause:94, deadlift_deficit:92.5
};

// Profils techniques disponibles pour chaque mouvement
const PROFILE_TYPES={
  squat:[{k:'classic',l:'Classique',em:'🏋️'},{k:'quad',l:'Quad dominant',em:'⬆️'},{k:'hip',l:'Hip dominant',em:'↩️'}],
  bench:[{k:'classic',l:'Classique',em:'🏋️'},{k:'rom_plus',l:'ROM +',em:'📈'},{k:'rom_minus',l:'ROM −',em:'📉'}],
  deadlift:[{k:'tradi',l:'Conventionnel',em:'🏋️'},{k:'sumo',l:'Sumo',em:'🦵'}]
};

// Toutes les variantes avec leur % — indexées par mouvement
const ALL_VARS={
  S:[
    {l:'Squat compétition', pct:100,  k:'squat_competition'},
    {l:'Beltless',          pct:96.5, k:null},
    {l:'Tempo',             pct:95,   k:null},
    {l:'Pause',             pct:94,   k:'squat_pause'},
    {l:'High bar',          pct:93,   k:'squat_high_bar'},
    {l:'SSB',               pct:88,   k:null},
    {l:'Front squat',       pct:82,   k:null},
    {l:'Zercher',           pct:78,   k:null}
  ],
  B:[
    {l:'Spoto',             pct:103.5,k:'spoto_press'},
    {l:'Block press',       pct:103.5,k:null},
    {l:'Bench compétition', pct:100,  k:'bench_competition'},
    {l:'Close grip',        pct:97.5, k:'close_grip_bench'},
    {l:'Larsen',            pct:96.5, k:null},
    {l:'Tempo',             pct:95,   k:null},
    {l:'Feet up',           pct:95,   k:null},
    {l:'Pause',             pct:94,   k:'bench_pause'}
  ],
  D:[
    {l:'Deadlift compétition',pct:100, k:'deadlift_competition'},
    {l:'Closer stance',      pct:96.5, k:null},
    {l:'Beltless',           pct:95,   k:null},
    {l:'Block pull',         pct:95,   k:null},
    {l:'Tempo',              pct:95,   k:null},
    {l:'Pause',              pct:94,   k:'deadlift_pause'},
    {l:'Alt stance',         pct:92.5, k:null},
    {l:'RDL',                pct:92.5, k:'deadlift_deficit'}
  ]
};

// Calcule le max d'une variante à partir du max de base et des % de profil
// famKey = 'S'|'B'|'D', varKey = clé de la variante, athProf = objet profil athlète
function getVarMax(famKey,varKey,athProf){
  const baseMax=famKey==='S'?Number(athProf?.maxSQ||0):famKey==='B'?Number(athProf?.maxBP||0):Number(athProf?.maxDL||0);
  if(!baseMax)return null;
  // % de la variante dans ALL_VARS
  const mv=ALL_VARS[famKey]?.find(v=>v.k===varKey);
  // fallback sur VAR_PCT si pas dans ALL_VARS
  const pct=mv?mv.pct:(VAR_PCT[varKey]||100);
  return Math.round(baseMax*(pct/100)*2)/2; // arrondi au 0.5 près
}

// Calcule la charge recommandée pour un exercice (kg), arrondie à 2.5 kg
function getAutoLoad(famKey,varKey,rpe,reps,athProf){
  const varMax=getVarMax(famKey,varKey,athProf);
  if(!varMax||!rpe||!reps)return null;
  const rpeKey=parseFloat(rpe);
  const row=RPE_TABLE[rpeKey];
  if(!row)return null;
  const repIdx=Math.min(Math.max(Math.round(reps)-1,0),9);
  const pct=row[repIdx];
  if(!pct)return null;
  const raw=varMax*(pct/100);
  return Math.round(raw/2.5)*2.5; // arrondi standard à 2.5 kg
}

// E1RM estimé à partir de la charge utilisée, du RPE ressenti sur la 1ère série
// et du nombre de reps effectuées (préremplies depuis le prévu).
// Formule : 0,0333 × charge × (reps + 9 − RPE) + charge — vide si RPE/reps/charge manquants.
function calcE1RM(load,rpe1,reps){
  if(load===''||load==null||rpe1===''||rpe1==null||reps===''||reps==null)return null;
  const l=Number(load),r=Number(rpe1),rp=Number(reps);
  if(!l||!r||!rp)return null;
  const v=0.0333*l*(rp+9-r)+l;
  return Math.round(v*10)/10;
}
function e1rmInner(e1rm){
  return e1rm!=null
    ?`<span class="suivi-e1rm-lbl">🏆 E1RM estimé</span><span class="suivi-e1rm-val">${e1rm} kg</span>`
    :`<span class="suivi-e1rm-lbl" style="color:var(--t3)">🏆 E1RM estimé</span><span class="suivi-e1rm-val suivi-empty-e1rm">—</span>`;
}
// ── Stats agrégées par mouvement (Squat/Bench/Deadlift), sur un ensemble de séances ──
// sets/tonnage/RPE visé : toutes les variantes confondues. E1RM : uniquement le comp lift.
function emptyFamStat(){return{sets:0,tonnage:0,rpeProgSum:0,rpeProgSets:0,rpeDoneSum:0,rpeDoneSets:0,e1rmList:[],rpeProgAvg:null,rpeDoneAvg:null,e1rmAvg:null}}
function computeStatsForSessions(sids){
  const stats={S:emptyFamStat(),B:emptyFamStat(),D:emptyFamStat()};
  sids.forEach(sid=>{
    const exs=DB.exs(sid);
    const perf=DB.perf(sid);
    exs.forEach(ex=>{
      const st=stats[ex.fam];if(!st)return;
      st.sets+=ex.sets;
      st.rpeProgSum+=Number(ex.rpe)*ex.sets;
      st.rpeProgSets+=ex.sets;
      const p=perf[ex.id];
      if(p&&p.load!=null&&p.load!==''){
        st.tonnage+=Number(p.load)*ex.reps*ex.sets;
      }
      const rv=[];
      if(p&&p.rpe1!=null)rv.push(Number(p.rpe1));
      if(p&&p.rpeLast!=null)rv.push(Number(p.rpeLast));
      if(rv.length){
        const avg=rv.reduce((a,c)=>a+c,0)/rv.length;
        st.rpeDoneSum+=avg*ex.sets;
        st.rpeDoneSets+=ex.sets;
      }
      if(ex.var===COMP_VAR[ex.fam]){
        const e1=calcE1RM(p?p.load:null,p?p.rpe1:null,ex.reps);
        if(e1!=null)st.e1rmList.push(e1);
      }
    });
  });
  ['S','B','D'].forEach(fk=>{
    const st=stats[fk];
    st.rpeProgAvg=st.rpeProgSets?st.rpeProgSum/st.rpeProgSets:null;
    st.rpeDoneAvg=st.rpeDoneSets?st.rpeDoneSum/st.rpeDoneSets:null;
    st.e1rmAvg=st.e1rmList.length?Math.round((st.e1rmList.reduce((a,c)=>a+c,0)/st.e1rmList.length)*10)/10:null;
  });
  return stats;
}
function fmtKg(n){return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')+' kg'}
const fR=s=>{const m=Math.floor(s/60),r=s%60;return m?(r?`${m}min ${r}s`:`${m}min`):`${r}s`};
const fRpe=r=>`RPE ${Number(r).toFixed(1)}`;
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── DB ───────────────────────────────────────────────────────────────
const DB={
  g:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},
  s:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
  coaches:()=>DB.g('cp_co')||[],
  saveCo:c=>DB.s('cp_co',c),
  findCo:email=>DB.coaches().find(c=>c.email===email.toLowerCase()),
  session:()=>DB.g('cp_se'),
  saveSe:s=>DB.s('cp_se',s),
  clearSe:()=>localStorage.removeItem('cp_se'),
  athletes:u=>DB.g(`cp_at_${u}`)||[],
  saveAth:(u,a)=>DB.s(`cp_at_${u}`,a),
  blocks:u=>DB.g(`cp_bl_${u}`)||[],
  saveBl:(u,b)=>DB.s(`cp_bl_${u}`,b),
  struct:bid=>DB.g(`cp_st_${bid}`)||[],
  saveSt:(bid,s)=>DB.s(`cp_st_${bid}`,s),
  exs:sid=>DB.g(`cp_ex_${sid}`)||[],
  saveEx:(sid,e)=>DB.s(`cp_ex_${sid}`,e),
  perf:sid=>DB.g(`cp_pf_${sid}`)||{},
  savePerf:(sid,p)=>DB.s(`cp_pf_${sid}`,p)
};

// ── AUTH ─────────────────────────────────────────────────────────────
let ME=null;
async function hashP(p){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
async function doReg(fn,ln,email,pw){
  const cs=DB.coaches();if(cs.find(c=>c.email===email.toLowerCase()))throw new Error('USED');
  const h=await hashP(pw);const c={id:uid(),email:email.toLowerCase(),fn,ln,h};
  cs.push(c);DB.saveCo(cs);DB.saveSe({id:c.id,email:c.email,fn,ln});ME=c;
}

// ── OPL ──────────────────────────────────────────────────────────────
// OpenIPF.org shares the exact same backend/database as OpenPowerlifting.org
// (same lifter usernames, same per-lifter CSV export), it's just a filtered
// front-end aimed at IPF lifters. We use it here since it's the source most
// relevant to IPF-affiliated athletes.
const OPL_BASE='https://www.openipf.org';
const OPL_PROXY='https://api.allorigins.win/raw?url=';
// Many public good-data sites like this one don't send CORS headers (they
// only expect to be called from their own front-end), so a direct browser
// fetch from another domain can fail even though the data exists. We try
// direct first, then fall back to a public CORS relay before giving up.
async function oplGet(url,timeoutMs){
  try{
    const r=await fetch(url,{signal:AbortSignal.timeout(timeoutMs)});
    if(r.ok)return r;
  }catch{}
  const r2=await fetch(OPL_PROXY+encodeURIComponent(url),{signal:AbortSignal.timeout(timeoutMs)});
  if(!r2.ok)throw new Error('http_'+r2.status);
  return r2;
}
async function oplSearch(fn,ln){
  try{
    const r=await oplGet(`${OPL_BASE}/api/search/rankings?q=${encodeURIComponent(fn+' '+ln)}&start=0`,6000);
    const d=await r.json();if(!d.rows)return{rows:[],error:false};
    return{rows:d.rows.slice(0,6).map(x=>({
      user:x.l?.username||'',name:x.l?.name||'',
      sq:x.l?.b3sq||null,bp:x.l?.b3bp||null,dl:x.l?.b3dl||null,tot:x.l?.tot||null,
      wc:x.l?.wc?x.l.wc+'kg':null,fed:x.l?.fed||null
    })).filter(x=>x.user),error:false};
  }catch{return{rows:[],error:true}}
}
async function oplFetch(user){
  try{
    const r=await oplGet(`${OPL_BASE}/u/${encodeURIComponent(user)}/csv`,9000);
    return{data:parseOpl(await r.text()),error:false};
  }catch{return{data:null,error:true}}
}
function parseOpl(csv){
  const lines=csv.trim().split('\n');if(lines.length<2)return{};
  const hdr=lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
  const g=(row,col)=>{const i=hdr.indexOf(col);return i>=0?row[i]?.replace(/"/g,'').trim():''};
  const gn=(row,col)=>{const v=parseFloat(g(row,col));return isNaN(v)||v<=0?null:v};
  const comps=[];let sq=0,bp=0,dl=0,tot=0,gender,wc;
  for(let i=1;i<lines.length;i++){
    const row=csvRow(lines[i]);if(row.length!==hdr.length)continue;
    const s=gn(row,'Best3SquatKg'),b=gn(row,'Best3BenchKg'),d=gn(row,'Best3DeadliftKg'),t=gn(row,'TotalKg');
    const date=g(row,'Date');
    if(!gender){const sx=g(row,'Sex');gender=sx==='M'?'M':sx==='F'?'F':undefined}
    if(!wc){const w=g(row,'WeightClassKg');if(w)wc=w+'kg'}
    if(s&&s>sq)sq=s;if(b&&b>bp)bp=b;if(d&&d>dl)dl=d;if(t&&t>tot)tot=t;
    const w2=g(row,'WeightClassKg');
    if(date&&(s||b||d||t))comps.push({date,fed:g(row,'Federation'),meet:g(row,'MeetName'),wc:w2?w2+'kg':'',sq:s,bp:b,dl:d,tot:t,place:g(row,'Place')});
  }
  comps.sort((a,b)=>b.date.localeCompare(a.date));
  return{gender,wc,comps,sq:sq||null,bp:bp||null,dl:dl||null,tot:tot||null};
}
function csvRow(line){const r=[];let cur='',q=false;for(const c of line){if(c==='"')q=!q;else if(c===','&&!q){r.push(cur);cur='';}else cur+=c}r.push(cur);return r}

// ── AGENDA ───────────────────────────────────────────────────────────
// Logique : chaque bloc a une date de fin = date de début + (nb de semaines × 7j).
// Le bloc est rangé dans l'agenda à la semaine (lundi→dimanche) qui SUIT
// celle de sa fin — c'est-à-dire la semaine où l'athlète a besoin d'un nouveau
// bloc prêt. Ex : un bloc qui finit le dimanche 3/05 tombe dans l'agenda à la
// "semaine du 4/05" (le lundi suivant).
const pad2=n=>String(n).padStart(2,'0');
const dkey=d=>`${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
function mondayOf(d){
  const x=new Date(d);x.setHours(0,0,0,0);
  const day=x.getDay();// 0=dim..6=sam
  const diff=(day+6)%7;// jours écoulés depuis le lundi de cette semaine-là
  x.setDate(x.getDate()-diff);
  return x;
}
// Date de fin réelle d'un bloc, ou null si aucune date de début n'a été définie
function blockEndDate(b){
  if(!b.startDate)return null;
  const sd=new Date(b.startDate+'T12:00:00');
  sd.setDate(sd.getDate()+b.wks*7);
  return sd;
}
// Semaine "agenda" (lundi) d'un bloc = le lundi qui suit la semaine de sa fin
function agendaWeekMonday(endDate){
  const mon=mondayOf(endDate);
  mon.setDate(mon.getDate()+7);
  return mon;
}
// Un bloc est considéré "publié" tant que son champ published n'est pas explicitement false
// (les blocs créés avant cette fonctionnalité restent donc publiés par défaut)
function isPublished(b){return b.published!==false}
// Dernier bloc en date d'un athlète (le plus récemment créé = son bloc actuel) —
// seuls les blocs publiés comptent : un brouillon n'est pas encore "distribué" à l'athlète
function athleteLatestBlock(athId){
  const bls=DB.blocks(ME.id).filter(b=>b.athId===athId&&isPublished(b));
  if(!bls.length)return null;
  return bls.slice().sort((a,b)=>(b.created||0)-(a.created||0))[0];
}
// Une entrée agenda par athlète (basée sur son dernier bloc uniquement)
function buildAgendaEntries(){
  return DB.athletes(ME.id).map(a=>{
    const blk=athleteLatestBlock(a.id);
    if(!blk)return null;
    const end=blockEndDate(blk);
    const wk=end?agendaWeekMonday(end):null;
    return{ath:a,block:blk,end,wk};
  }).filter(Boolean);
}
// Regroupe les entrées datées par semaine (clé = lundi), triées par date croissante
function groupAgendaByWeek(entries){
  const groups={};
  entries.forEach(e=>{
    if(!e.wk)return;
    const k=dkey(e.wk);
    (groups[k]=groups[k]||{monday:e.wk,items:[]}).items.push(e);
  });
  return Object.keys(groups).sort().map(k=>groups[k]);
}
function agendaWeekStatus(monday,curMonday){
  if(monday.getTime()<curMonday.getTime())return'late';
  if(dkey(monday)===dkey(curMonday))return'now';
  return'next';
}
function fmtWeekLong(mon){
  const y=mon.getFullYear()!==new Date().getFullYear()?' '+mon.getFullYear():'';
  return`semaine du ${mon.toLocaleDateString('fr-FR',{day:'numeric',month:'long'})}${y}`;
}
function fmtDateShort(d){return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}
// Résumé pour la carte d'aperçu du tableau de bord : la prochaine échéance agenda
function agendaNextEntry(){
  const groups=groupAgendaByWeek(buildAgendaEntries());
  if(!groups.length)return null;
  const g=groups[0];
  const status=agendaWeekStatus(g.monday,mondayOf(new Date()));
  const label=status==='late'?'⚠️ En retard':status==='now'?'🔥 Cette semaine':'📅 Prochaine échéance';
  const wkLbl=fmtWeekLong(g.monday);
  const text=g.items.length===1
    ?`${g.items[0].ath.fn} ${g.items[0].ath.ln} termine son bloc · ${wkLbl}`
    :`${g.items.length} athlètes terminent leur bloc · ${wkLbl}`;
  return{label,text};
}

function goAgenda(){go('s-agenda');rAgenda()}
function rAgenda(){
  const entries=buildAgendaEntries();
  const undated=entries.filter(e=>!e.wk);
  const groups=groupAgendaByWeek(entries);
  const curMonday=mondayOf(new Date());
  const lateCount=groups.filter(g=>agendaWeekStatus(g.monday,curMonday)==='late').reduce((n,g)=>n+g.items.length,0);
  const nowCount=groups.filter(g=>agendaWeekStatus(g.monday,curMonday)==='now').reduce((n,g)=>n+g.items.length,0);
  el('s-agenda').innerHTML=`
  <div class="topbar"><span class="tb-title">🗓️ Agenda</span></div>
  <div class="scroll" style="padding-bottom:80px"><div class="pad gap">
    ${entries.length===0?`
    <div class="empty"><span class="empty-emoji">🗓️</span><h3>Agenda vide</h3>
      <p class="sub">Créez un bloc pour un athlète, avec une date de début, et il apparaîtra ici, classé par date de fin.</p>
    </div>`:`
    <div class="card">
      <div class="stats">
        <div class="stat"><div class="stat-v" style="color:var(--er)">${lateCount}</div><div class="stat-l">En retard</div></div>
        <div class="sdiv"></div>
        <div class="stat"><div class="stat-v" style="color:var(--a)">${nowCount}</div><div class="stat-l">Cette semaine</div></div>
        <div class="sdiv"></div>
        <div class="stat"><div class="stat-v" style="color:var(--p)">${entries.length}</div><div class="stat-l">Athlètes suivis</div></div>
      </div>
    </div>
    ${groups.map(g=>{
      const status=agendaWeekStatus(g.monday,curMonday);
      const dotBg=status==='late'?'var(--er)':status==='now'?'var(--a)':'var(--p)';
      const badge=status==='late'?'<span class="badge bd-er">⚠️ En retard</span>':status==='now'?'<span class="badge bd-a">🔥 Cette semaine</span>':'';
      const wkEnd=new Date(g.monday);wkEnd.setDate(wkEnd.getDate()+6);
      return`
      <div class="ag-card">
        <div class="ag-wk-hdr">
          <div class="ag-wk-dot" style="background:${dotBg};color:#fff">🗓️</div>
          <div style="flex:1;min-width:0">
            <h4>Semaine du ${g.monday.toLocaleDateString('fr-FR',{day:'numeric',month:'long'})}</h4>
            <p class="caption">${fmtDateShort(g.monday)} → ${fmtDateShort(wkEnd)}</p>
          </div>
          ${badge}
        </div>
        ${g.items.map(e=>`
        <div class="ag-row" onclick="showBlk('${e.block.id}')">
          <div class="avatar av-sm">${esc((e.ath.fn[0]||'')+(e.ath.ln[0]||'')).toUpperCase()}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700">${esc(e.ath.fn)} ${esc(e.ath.ln)}</div>
            <p class="caption">${esc(e.block.name)} · termine le ${fmtDateShort(e.end)}</p>
          </div>
          <span style="color:var(--t3);font-size:18px">›</span>
        </div>`).join('')}
      </div>`;
    }).join('')}
    ${undated.length?`
    <div class="ag-card">
      <div class="ag-wk-hdr">
        <div class="ag-wk-dot" style="background:var(--bor);color:var(--t2)">❔</div>
        <div style="flex:1;min-width:0"><h4>Date de début à définir</h4><p class="caption">Ajoutez une date pour calculer la fin du bloc</p></div>
      </div>
      ${undated.map(e=>`
      <div class="ag-row" onclick="showBlk('${e.block.id}')">
        <div class="avatar av-sm">${esc((e.ath.fn[0]||'')+(e.ath.ln[0]||'')).toUpperCase()}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700">${esc(e.ath.fn)} ${esc(e.ath.ln)}</div>
          <p class="caption">${esc(e.block.name)}</p>
        </div>
        <span style="color:var(--t3);font-size:18px">›</span>
      </div>`).join('')}
    </div>`:''}
    `}
  </div></div>
  <div class="tabs">
    <button class="tab" onclick="go('s-dash');rDash()"><span class="tab-i">📊</span><span class="tab-l">Tableau de bord</span></button>
    <button class="tab" onclick="goAths()"><span class="tab-i">🏋️</span><span class="tab-l">Athlètes</span></button>

  </div>`;

async function doOpl(){
  const fn=el('nfn').value.trim(),ln=el('nln').value.trim();
  const oplUser=el('nopluser').value.trim();
  if(!fn||!ln){el('nerr').textContent='Prénom et nom requis';el('nerr').style.display='';return}
  el('nerr').style.display='none';
  // Si un username direct est fourni, on bypasse la recherche et on importe directement
  if(oplUser){
    rNewAth({step:'direct',fn,ln,oplUser,loading:true,loadingDirect:true,results:[],searchError:false});
    await selOpl(oplUser);
    return;
  }
  rNewAth({step:'searching',fn,ln,oplUser:'',loading:true,loadingDirect:false,results:[],searchError:false});
  const res=await oplSearch(fn,ln);
  rNewAth({step:'results',loading:false,loadingDirect:false,results:res.rows,searchError:res.error});
}
async function selOpl(user){
  toast('⏳ Import des données OPL...');
  const r=await oplFetch(user);
  const data=r.data;
  const a={id:uid(),fn:NA.fn,ln:NA.ln,opl:user,gender:data?.gender||null,wc:data?.wc||null,
    sq:data?.sq||null,bp:data?.bp||null,dl:data?.dl||null,tot:data?.tot||null,comps:data?.comps||[],created:Date.now()};
  const aths=DB.athletes(ME.id);aths.push(a);DB.saveAth(ME.id,aths);
  NA={step:'form',fn:'',ln:'',results:[],loading:false};
  back();back();showAth(a.id);
  toast(r.error?'⚠️ Profil créé, mais l\'import des données a échoué (connexion)':'✅ Athlète créé avec profil OPL');
}
function createEmpty(){
  const a={id:uid(),fn:NA.fn,ln:NA.ln,created:Date.now()};
  const aths=DB.athletes(ME.id);aths.push(a);DB.saveAth(ME.id,aths);
  NA={step:'form'};back();back();showAth(a.id);
}

  function varRow(fam,label,col,max){
    if(!max)return`<p class="sub" style="font-size:12px;font-style:italic">Définir le max pour voir les variantes</p>`;

// ── PROGRESSION ──────────────────────────────────────────────────────
// Meilleur E1RM jamais enregistré (toutes séances de tous les blocs de l'athlète
// confondues) pour une variante donnée. excludeSid/excludeExId permettent d'exclure
// l'entrée en cours de saisie, pour comparer un nouveau résultat à "ce qui existait avant".
function bestE1rmForVar(athId,fam,varKey,excludeSid,excludeExId){
  let best=null;
  DB.blocks(ME.id).filter(b=>b.athId===athId).forEach(b=>{
    DB.struct(b.id).forEach(w=>{
      w.sess.forEach(s=>{
        const exs=DB.exs(s.id).filter(e=>e.fam===fam&&e.var===varKey);
        if(!exs.length)return;
        const perf=DB.perf(s.id);
        exs.forEach(e=>{
          if(excludeSid&&excludeExId&&s.id===excludeSid&&e.id===excludeExId)return;
          const p=perf[e.id];if(!p)return;
          const e1=calcE1RM(p.load,p.rpe1,e.reps);
          if(e1!=null&&(best==null||e1>best.e1rm)){
            best={e1rm:e1,load:Number(p.load),reps:e.reps,rpe:p.rpe1!=null?Number(p.rpe1):null,block:b.name};
          }
        });
      });
    });
  });
  return best;
}
// Fusionne les compétitions importées d'OpenPowerlifting (a.comps, lecture seule) et les
// résultats saisis manuellement (a.manualComps), triés chronologiquement
function getCompPoints(a){
  const manual=(a.manualComps||[]).map(c=>({...c}));
  const all=[...(a.comps||[]),...manual].filter(c=>c&&c.date);
  all.sort((x,y)=>x.date.localeCompare(y.date));
  return all;
}
function addManualComp(){

  if(!sqN&&!bpN&&!dlN){toast('⚠️ Renseigne au moins un mouvement');return}

  if(!aths[i].manualComps)aths[i].manualComps=[];
  aths[i].manualComps.push({id:uid(),date,meet:meet||'Compétition',sq:sqN,bp:bpN,dl:dlN,tot:tot||null,manual:true});
  DB.saveAth(ME.id,aths);

}

// Construit un mini graphique en courbes (SVG) à partir de plusieurs séries de points.
// series: [{label,color,data:[{x:index,y:valeur|null}],fmt?:fn}], xLabels alignés sur les index x.
// Renvoie null s'il n'y a aucune donnée à afficher.
function buildLineChartSVG(series,xLabels,opts={}){
  const W=opts.w||320,H=opts.h||170,padL=opts.padL||34,padR=10,padT=14,padB=22;
  const innerW=W-padL-padR,innerH=H-padT-padB;
  const allVals=series.flatMap(s=>s.data.filter(d=>d.y!=null).map(d=>d.y));
  if(!allVals.length)return null;
  let minV=Math.min(...allVals),maxV=Math.max(...allVals);
  if(minV===maxV){minV-=Math.max(5,minV*0.1);maxV+=Math.max(5,maxV*0.1)}
  const padV=(maxV-minV)*0.15;minV=Math.max(0,minV-padV);maxV=maxV+padV;
  const n=xLabels.length;
  const xPos=i=>n>1?padL+(innerW*i/(n-1)):padL+innerW/2;
  const yPos=v=>padT+innerH-((v-minV)/(maxV-minV))*innerH;
  const yFmt=opts.yFmt||(v=>Math.round(v));
  const gridLines=[0,0.5,1].map(f=>{
    const v=minV+(maxV-minV)*f,y=yPos(v);
    return`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="var(--bor2)" stroke-width="1"/><text x="${padL-5}" y="${(y+3).toFixed(1)}" font-size="9" fill="var(--t3)" text-anchor="end">${yFmt(v)}</text>`;
  }).join('');
  const skip=n>6?Math.ceil(n/6):1;
  const xTicks=xLabels.map((lbl,i)=>{
    if(n>1&&i%skip!==0&&i!==n-1)return'';
    return`<text x="${xPos(i).toFixed(1)}" y="${H-5}" font-size="8" fill="var(--t3)" text-anchor="middle">${esc(String(lbl))}</text>`;
  }).join('');
  const seriesSvg=series.map(s=>{
    const pts=s.data.filter(d=>d.y!=null);
    if(!pts.length)return'';
    const path=pts.map((d,idx)=>`${idx===0?'M':'L'}${xPos(d.x).toFixed(1)},${yPos(d.y).toFixed(1)}`).join(' ');
    const dots=pts.map(d=>`<circle cx="${xPos(d.x).toFixed(1)}" cy="${yPos(d.y).toFixed(1)}" r="3" fill="${s.color}"/>`).join('');
    return`<path d="${path}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}`;
  }).join('');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">${gridLines}${seriesSvg}${xTicks}</svg>`;
}
// Légende sous un graphique : pastille couleur + nom + dernière valeur connue
function chartLegend(series){
  return`<div style="display:flex;gap:14px;justify-content:center;margin-top:8px;flex-wrap:wrap">
    ${series.map(s=>{
      const pts=s.data.filter(d=>d.y!=null);
      const last=pts.length?pts[pts.length-1].y:null;
      const fmt=s.fmt||(v=>Math.round(v*10)/10+' kg');
      return`<span style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--t2)">
        <span style="width:9px;height:9px;border-radius:50%;background:${s.color};display:inline-block;flex-shrink:0"></span>
        ${esc(s.label)}${last!=null?' · '+fmt(last):''}
      </span>`;
    }).join('')}
  </div>`;
}

function rAthProg(){
  const a=DB.athletes(ME.id).find(x=>x.id===curAth);
  if(!a){back();return}
  const prof=a.prof||{};

  // ── 1. Évolution en compétition (OpenPowerlifting + saisie manuelle) ──
  const comps=getCompPoints(a);
  const compXLabels=comps.map(c=>{
    const d=new Date(c.date);
    return isNaN(d.getTime())?c.date:d.toLocaleDateString('fr-FR',{month:'short',year:'2-digit'});
  });
  const compSeries=[
    {label:'Squat',color:'var(--sq)',data:comps.map((c,i)=>({x:i,y:c.sq||null}))},
    {label:'Bench',color:'var(--be)',data:comps.map((c,i)=>({x:i,y:c.bp||null}))},
    {label:'Deadlift',color:'var(--dl)',data:comps.map((c,i)=>({x:i,y:c.dl||null}))}
  ];
  const compChartSvg=comps.length?buildLineChartSVG(compSeries,compXLabels):null;

  // ── 2. Blocs de l'athlète, triés chronologiquement (date de début, sinon création) ──
  const blocksAll=DB.blocks(ME.id).filter(b=>b.athId===a.id)
    .filter(b=>DB.struct(b.id).length>0)
    .sort((x,y)=>(x.startDate?new Date(x.startDate).getTime():(x.created||0))-(y.startDate?new Date(y.startDate).getTime():(y.created||0)));
  const blockLabels=blocksAll.map(b=>b.name);
  const e1rmData={S:[],B:[],D:[]},tonData={S:[],B:[],D:[]};
  blocksAll.forEach((b,i)=>{
    const str=DB.struct(b.id);
    const lastSids=str[str.length-1].sess.map(s=>s.id);
    const lastStats=computeStatsForSessions(lastSids);
    const allSids=str.flatMap(w=>w.sess.map(s=>s.id));
    const allStats=computeStatsForSessions(allSids);
    ['S','B','D'].forEach(fk=>{
      e1rmData[fk].push({x:i,y:lastStats[fk].e1rmAvg});
      tonData[fk].push({x:i,y:allStats[fk].tonnage>0?allStats[fk].tonnage:null});
    });
  });
  const e1rmSeries=[
    {label:'Squat',color:'var(--sq)',data:e1rmData.S},
    {label:'Bench',color:'var(--be)',data:e1rmData.B},
    {label:'Deadlift',color:'var(--dl)',data:e1rmData.D}
  ];
  const tonSeries=[
    {label:'Squat',color:'var(--sq)',data:tonData.S,fmt:fmtKg},
    {label:'Bench',color:'var(--be)',data:tonData.B,fmt:fmtKg},
    {label:'Deadlift',color:'var(--dl)',data:tonData.D,fmt:fmtKg}
  ];
  const e1rmChartSvg=blockLabels.length?buildLineChartSVG(e1rmSeries,blockLabels):null;
  const tonChartSvg=blockLabels.length?buildLineChartSVG(tonSeries,blockLabels,{yFmt:v=>Math.round(v/100)/10+'k'}):null;

  // ── 3. PR par variation : meilleur E1RM réalisé en Suivi, comparé au max théorique du profil ──
  function prRow(famKey,v){
    const best=bestE1rmForVar(a.id,famKey,v.k);
    const theo=getVarMax(famKey,v.k,prof);
    const isRealPR=best&&(!theo||best.e1rm>theo);
    if(best){
      return`<div style="display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--bor2)">
        <span style="flex:1;font-size:13px">${esc(v.l)}${isRealPR?' 🏆':''}</span>
        <div style="text-align:right">
          <div style="font-size:14px;font-weight:800;color:var(--t)">${best.e1rm} kg<span style="font-size:10px;color:var(--t3);font-weight:600"> e1RM</span></div>
          <div style="font-size:10px;color:var(--t3)">${best.load}kg×${best.reps}${best.rpe?' @'+best.rpe:''} · ${esc(best.block||'')}</div>
        </div>
      </div>`;
    }
    return`<div style="display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--bor2)">
      <span style="flex:1;font-size:13px;color:var(--t2)">${esc(v.l)}</span>
      <span style="font-size:13px;font-weight:700;color:var(--t3)">${theo?theo+' kg (théo.)':'—'}</span>
    </div>`;
  }
  const prTable=['S','B','D'].map(fk=>{
    const fam=EX[fk];
    return`<div style="margin-bottom:14px">
      <p style="font-size:13px;font-weight:700;color:${fam.col};margin-bottom:2px">${fam.em} ${fam.lbl}</p>
      ${fam.vars.map(v=>prRow(fk,v)).join('')}
    </div>`;
  }).join('');

  el('s-ath-prog').innerHTML=`
  <div class="topbar"><button class="tb-back" onclick="back()">←</button><span class="tb-title">Progression — ${esc(a.fn)}</span></div>
  <div class="scroll"><div class="pad gap" style="padding-bottom:40px">

    <div class="card gap">
      <h4>🏆 Évolution en compétition</h4>
      <p class="sub" style="font-size:12px;margin-top:-4px">Charge max par mouvement, compétition après compétition</p>
      ${compChartSvg?`${compChartSvg}${chartLegend(compSeries)}`:`<p class="sub" style="font-size:12px;font-style:italic;text-align:center;padding:10px 0">Pas assez de résultats pour tracer une courbe (2 dates minimum).</p>`}
      <div style="height:1px;background:var(--bor)"></div>
      <p style="font-size:12px;font-weight:700;color:var(--t2)">Ajouter un résultat manuellement</p>
      <div class="row2">
        <div class="field"><label>Date</label><input class="inp" id="mc-date" type="date"/></div>
        <div class="field"><label>Compétition</label><input class="inp" id="mc-meet" placeholder="Nom (optionnel)"/></div>
      </div>
      <div style="display:flex;gap:8px">
        <div class="field" style="flex:1"><label style="color:var(--sq)">Squat</label><input class="inp" id="mc-sq" type="number" step="0.5" placeholder="—" style="text-align:center"/></div>
        <div class="field" style="flex:1"><label style="color:var(--be)">Bench</label><input class="inp" id="mc-bp" type="number" step="0.5" placeholder="—" style="text-align:center"/></div>
        <div class="field" style="flex:1"><label style="color:var(--dl)">Deadlift</label><input class="inp" id="mc-dl" type="number" step="0.5" placeholder="—" style="text-align:center"/></div>
      </div>
      <button class="btn btn-s" onclick="addManualComp()">+ Ajouter ce résultat</button>
      ${(a.manualComps&&a.manualComps.length)?`<div>
        ${a.manualComps.slice().sort((x,y)=>y.date.localeCompare(x.date)).map(c=>`
        <div class="comp-row">
          <span class="comp-date">${esc(c.date)}</span>
          <div style="flex:1;min-width:0"><div class="comp-meet">${esc(c.meet)}</div><div class="comp-fed">Saisi manuellement</div></div>
          <div style="display:flex;gap:5px;align-items:center">
            ${c.sq?`<span class="cl" style="color:var(--sq)">${c.sq}</span>`:''}
            ${c.bp?`<span class="cl" style="color:var(--be)">${c.bp}</span>`:''}
            ${c.dl?`<span class="cl" style="color:var(--dl)">${c.dl}</span>`:''}
            <button onclick="delManualComp('${c.id}')" style="background:none;border:none;cursor:pointer;font-size:14px;color:var(--t3);padding:2px 4px">🗑️</button>
          </div>
        </div>`).join('')}
      </div>`:''}
    </div>

    <div class="card gap">
      <h4>📈 Évolution E1RM (par bloc)</h4>
      <p class="sub" style="font-size:12px;margin-top:-4px">E1RM moyen estimé sur la dernière semaine de chaque bloc (mouvements compétition)</p>
      ${e1rmChartSvg?`${e1rmChartSvg}${chartLegend(e1rmSeries)}`:`<p class="sub" style="font-size:12px;font-style:italic;text-align:center;padding:10px 0">Aucune donnée de Suivi disponible pour le moment.</p>`}
    </div>

    <div class="card gap">
      <h4>📦 Évolution du tonnage (par bloc)</h4>
      <p class="sub" style="font-size:12px;margin-top:-4px">Tonnage total déplacé sur l'ensemble du bloc, par mouvement</p>
      ${tonChartSvg?`${tonChartSvg}${chartLegend(tonSeries)}`:`<p class="sub" style="font-size:12px;font-style:italic;text-align:center;padding:10px 0">Aucune donnée de Suivi disponible pour le moment.</p>`}
    </div>

    <div class="card gap">

      ${prTable}

  </div></div>`;

function createBlk(){
  const name=(el('bn').value||BF.name).trim();
  if(!name){el('berr').textContent='Nom requis';el('berr').style.display='';return}
  const a=DB.athletes(ME.id).find(x=>x.id===curAth);
  const {spw,wks}=BF,tot=spw*wks;
  const bid=uid();
  const bls=DB.blocks(ME.id);
  bls.push({id:bid,athId:curAth,athName:`${a.fn} ${a.ln}`,name,spw,wks,total:tot,startDate:BF.startDate||null,created:Date.now(),published:false});
  DB.saveBl(ME.id,bls);
  const str=[];
  for(let w=1;w<=wks;w++){
    const sess=[];for(let s=1;s<=spw;s++)sess.push({id:uid(),sn:s});
    str.push({id:uid(),wn:w,sess});
  }
  DB.saveSt(bid,str);
  back();rAth();toast('✅ Bloc créé');showBlk(bid);
}
// Modifie un bloc existant : nom/dates simples, et restructure séances/semaines
// en conservant le contenu existant (ajout = vide ou hérité de Sem.1, réduction = perte confirmée)
function saveBlkEdit(){
  const name=(el('bn').value||BF.name).trim();
  if(!name){el('berr').textContent='Nom requis';el('berr').style.display='';return}
  const bid=BF.editing;
  const bls=DB.blocks(ME.id);
  const idx=bls.findIndex(x=>x.id===bid);if(idx<0)return;
  const old=bls[idx];
  const newSpw=BF.spw,newWks=BF.wks;
  const losing=newSpw<old.spw||newWks<old.wks;
  const apply=()=>{
    const str=DB.struct(bid);
    // 1) ajuste le nb de séances/semaine pour chaque semaine existante
    str.forEach(w=>{
      if(newSpw>w.sess.length){
        for(let s=w.sess.length+1;s<=newSpw;s++)w.sess.push({id:uid(),sn:s});
      }else if(newSpw<w.sess.length){
        w.sess=w.sess.filter(s=>s.sn<=newSpw);
      }
    });
    // 2) ajuste le nb de semaines
    if(newWks>str.length){
      for(let wn=str.length+1;wn<=newWks;wn++){
        const sess=[];for(let s=1;s<=newSpw;s++)sess.push({id:uid(),sn:s});
        str.push({id:uid(),wn,sess});
      }
    }else if(newWks<str.length){
      str.length=newWks;
    }
    DB.saveSt(bid,str);
    bls[idx]={...old,name,spw:newSpw,wks:newWks,total:newSpw*newWks,startDate:BF.startDate||null};
    DB.saveBl(ME.id,bls);
    // repeuple les semaines (nouvelles ou existantes) depuis le contenu actuel de la Sem.1
    if(str.length>1){
      const prof=curAthProf();
      str[0].sess.forEach(s=>{DB.exs(s.id).forEach(ex=>propagateToFutureWeeks(s.id,ex,prof))});
    }
    back();rBlk();toast('✅ Bloc mis à jour');
  };
  if(losing){
    showSheet('Réduire le bloc','Les séances et/ou semaines en trop seront définitivement supprimées, avec leurs exercices.','⚠️ Confirmer',apply);
  }else{
    apply();
  }
}

// ── PROPAGATION AUTOMATIQUE SEM.1 → SEMAINES SUIVANTES ─────────────────
// RPE effectif d'une semaine donnée = RPE de base + (incrément × offset), arrondi au 0.5 et borné [4,10]
function computeWeekRpe(baseRpe,rpeInc,offset){
  let r=Number(baseRpe||0)+Number(rpeInc||0)*offset;
  r=Math.round(r*2)/2;
  return Math.max(4,Math.min(10,r));
}
// Retrouve la position (semaine/séance) d'un sid dans la structure du bloc courant
function findWkSes(sid){
  const str=DB.struct(curBlk);
  for(let wi=0;wi<str.length;wi++){
    const s=str[wi].sess.find(x=>x.id===sid);
    if(s)return{wi,wn:str[wi].wn,sn:s.sn,str};
  }
  return null;
}
function curAthProf(){
  const b=DB.blocks(ME.id).find(b=>b.id===curBlk);
  const a=b?DB.athletes(ME.id).find(a=>a.id===b.athId):null;
  return a?.prof||{};
}
// Pousse un exercice de la semaine 1 vers toutes les semaines suivantes (même sn),
// en recalculant la charge selon le RPE incrémenté — sauf override manuel conservé
function propagateToFutureWeeks(originSid,ex,prof){
  const loc=findWkSes(originSid);
  if(!loc||loc.wi!==0||loc.str.length<2)return;
  for(let fw=1;fw<loc.str.length;fw++){
    const fses=loc.str[fw].sess.find(s=>s.sn===loc.sn);
    if(!fses)continue;
    const exs=DB.exs(fses.id);
    const idx=exs.findIndex(e=>e.id===ex.id);
    const keepOvr=idx>=0&&exs[idx].ovr;
    const effRpe=computeWeekRpe(ex.rpe,ex.rpeInc||0,fw);
    const autoLoad=getAutoLoad(ex.fam,ex.var,effRpe,ex.reps,prof);
    const lmin=keepOvr?exs[idx].lmin:(autoLoad||0);
    const payload={
      id:ex.id,fam:ex.fam,var:ex.var,sets:ex.sets,reps:ex.reps,
      rpe:effRpe,rest:RPE_R[effRpe]||ex.rest,restOvr:false,pres:ex.pres,
      lt:'fixed',lmin,lmax:null,
      order:idx>=0?exs[idx].order:exs.length,ovr:keepOvr,rpeInc:ex.rpeInc||0
    };
    if(idx>=0)exs[idx]=payload;else exs.push(payload);
    DB.saveEx(fses.id,exs);
  }
}
// Supprime un exercice (lié par id) dans toutes les semaines suivantes
function removeFromFutureWeeks(originSid,exId){
  const loc=findWkSes(originSid);
  if(!loc||loc.wi!==0||loc.str.length<2)return;
  for(let fw=1;fw<loc.str.length;fw++){
    const fses=loc.str[fw].sess.find(s=>s.sn===loc.sn);
    if(!fses)continue;
    DB.saveEx(fses.id,DB.exs(fses.id).filter(e=>e.id!==exId));
  }
}
// Construit la liste des charges prévues (semaines 2..N) pour un exercice de la semaine 1
function getFutureLoadsForEx(sid,ex,prof){
  const loc=findWkSes(sid);
  if(!loc||loc.wi!==0||loc.str.length<2)return[];
  const out=[];
  for(let fw=1;fw<loc.str.length;fw++){
    const fses=loc.str[fw].sess.find(s=>s.sn===loc.sn);
    const wn=loc.str[fw].wn;
    if(!fses){out.push({idx:fw,wn,rpe:null,load:null,ovr:false});continue}
    const existing=DB.exs(fses.id).find(e=>e.id===ex.id);
    const effRpe=computeWeekRpe(ex.rpe,ex.rpeInc||0,fw);
    const load=(existing&&existing.ovr)?existing.lmin:getAutoLoad(ex.fam,ex.var,effRpe,ex.reps,prof);
    out.push({idx:fw,wn,rpe:effRpe,load:load||0,ovr:existing?!!existing.ovr:false});
  }
  return out;
}
// Modifie manuellement la charge d'une semaine future (override), ou la réinitialise si value===''
function setFutureLoad(originSid,exId,fwi,value){
  const loc=findWkSes(originSid);if(!loc)return;
  const fw=loc.str[fwi];if(!fw)return;
  const fses=fw.sess.find(s=>s.sn===loc.sn);if(!fses)return;
  const origin=DB.exs(originSid).find(e=>e.id===exId);if(!origin)return;
  const prof=curAthProf();
  const effRpe=computeWeekRpe(origin.rpe,origin.rpeInc||0,fwi);
  const exs=DB.exs(fses.id);
  const idx=exs.findIndex(e=>e.id===exId);
  const manual=value!==''&&value!=null;
  const autoLoad=getAutoLoad(origin.fam,origin.var,effRpe,origin.reps,prof);
  const lmin=manual?Number(value):(autoLoad||0);
  const payload={
    id:exId,fam:origin.fam,var:origin.var,sets:origin.sets,reps:origin.reps,
    rpe:effRpe,rest:RPE_R[effRpe]||origin.rest,restOvr:false,pres:origin.pres,
    lt:'fixed',lmin,lmax:null,
    order:idx>=0?exs[idx].order:exs.length,ovr:manual,rpeInc:origin.rpeInc||0
  };
  if(idx>=0)exs[idx]=payload;else exs.push(payload);
  DB.saveEx(fses.id,exs);
  rSesBody(originSid);
  toast(manual?'✅ Charge ajustée':'↺ Recalculée auto');
}
// Recalcule toutes les charges auto (non overridées) de toutes les semaines, depuis la sem.1 —
// utile si le profil de l'athlète (maxs) a changé après la création du bloc
function recalcAllFutureWeeks(){
  const str=DB.struct(curBlk);if(str.length<2)return;

}

}

        </select>

// Sauvegarde la perf saisie (charge / RPE 1ère ou dernière série) et recalcule l'E1RM affiché,
// sans re-render complet (pour ne pas perdre le focus pendant la saisie)
function updatePerf(sid,exId,field,value,reps){
  const perf=DB.perf(sid);
  if(!perf[exId])perf[exId]={};
  perf[exId][field]=value===''?null:Number(value);
  DB.savePerf(sid,perf);
  const e1rm=calcE1RM(perf[exId].load,perf[exId].rpe1,reps);
  const badge=el(`e1rm-${sid}-${exId}`);
  if(badge)badge.innerHTML=e1rmInner(e1rm);
  // Détection de PR en direct : compare ce nouvel E1RM au meilleur déjà connu pour cette
  // variante (historique des blocs + max théorique du profil) → alerte si nouveau record
  if(e1rm!=null){
    const b=DB.blocks(ME.id).find(x=>x.id===curBlk);
    const ex=DB.exs(sid).find(x=>x.id===exId);
    if(b&&ex){
      const a=DB.athletes(ME.id).find(x=>x.id===b.athId);
      const theo=getVarMax(ex.fam,ex.var,a?.prof||{});
      const prev=bestE1rmForVar(b.athId,ex.fam,ex.var,sid,exId);
      const baseline=Math.max(prev?.e1rm||0,theo||0);
      if(e1rm>baseline){
        const v=EX[ex.fam]?.vars.find(x=>x.k===ex.var);
        toast(`🏆 Nouveau PR ${v?.l||ex.var} : ${e1rm} kg (e1RM) !`);
      }
    }
  }
}

// Formulaire de saisie rapide inline
let QE={};// keyed by sid
function defaultQE(){

      </div>

        <span class="qe-sep">×</span>
        <div class="qe-field"><label>Reps</label>
          <input type="number" min="1" max="10" value="${q.reps}" id="qereps-${sid}"
            oninput="QE['${sid}'].reps=parseInt(this.value)||1;qeUpdLoad('${sid}')"/></div>
        <span class="qe-sep">@</span>

          <select id="qerpe-${sid}" onchange="QE['${sid}'].rpe=parseFloat(this.value);qeUpdLoad('${sid}')">

          </div>
        </div>
        ${DB.struct(curBlk).length>1?`<div class="qe-field"><label>Prog/sem</label>

// ── Quick entry logic ─────────────────────────────────────────────────
function qeRenderSuggestions(sid){
  const q=QE[sid];if(!q)return;
  const sugDiv=el(`qesug-${sid}`);if(!sugDiv)return;
  const qLow=q.q.toLowerCase().trim();
  const filtered=!qLow?[]:(()=>{
    let res=[];
    Object.entries(EX).forEach(([fam,fo])=>{
      fo.vars.forEach(v=>{
        const search=(fam+' '+fo.lbl+' '+v.l+' '+v.a).toLowerCase();
        if(qLow.split(' ').every(w=>search.includes(w)))res.push({fam,fobj:fo,var:v});
      });
    });
    return res.slice(0,6);
  })();
  if(filtered.length>0){
    sugDiv.innerHTML=filtered.map(e=>`
    <div class="qe-sug-item" onmousedown="qeSelect('${sid}','${e.fam}','${e.var.k}','${esc(e.var.l)}')">
      <span class="qe-sug-fam" style="background:${e.fobj.bg};color:${e.fobj.col}">${e.fobj.em} ${e.fobj.lbl}</span>
      <span class="qe-sug-name">${esc(e.var.l)}</span>
      <span class="qe-sug-abbr">${esc(e.var.a)}</span>
    </div>`).join('');
    sugDiv.style.display='';
  } else {
    sugDiv.innerHTML='';
    sugDiv.style.display='none';
  }
}
function qeInput(sid,val){
  if(!QE[sid])QE[sid]=defaultQE();
  QE[sid].q=val;
  if(!val&&!QE[sid].fam){QE[sid].fam=null;QE[sid].var=null}
  // Si un exercice est déjà sélectionné, on ne touche pas à fam/var
  qeRenderSuggestions(sid);
}
function qeFocus(sid){
  if(!QE[sid])QE[sid]=defaultQE();
  qeRenderSuggestions(sid);
}
function qeSelect(sid,fam,varKey,varLabel){
  if(!QE[sid])QE[sid]=defaultQE();
  QE[sid].fam=fam;QE[sid].var=varKey;QE[sid].q='';
  // auto-charge
  const b=DB.blocks(ME.id).find(b=>b.id===curBlk);
  const a=b?DB.athletes(ME.id).find(a=>a.id===b.athId):null;
  const prof=a?.prof||{};
  const al=getAutoLoad(fam,varKey,QE[sid].rpe,QE[sid].reps,prof);
  if(al&&!QE[sid].lmin)QE[sid].lmin=String(al);
  rSesBody(sid);
  setTimeout(()=>{const inp=el(`qesets-${sid}`);if(inp)inp.focus()},50);
}
function qeClear(sid){
  if(QE[sid]){QE[sid].fam=null;QE[sid].var=null;QE[sid].q='';QE[sid].lmin='';QE[sid].editing=null}
  rSesBody(sid);
  setTimeout(()=>{const inp=el(`qeinp-${sid}`);if(inp)inp.focus()},50);
}
function qeSetPres(sid,val){
  if(!QE[sid])return;
  QE[sid].pres=val;
  rSesBody(sid);
}
function qeUpdLoad(sid){
  if(!QE[sid])return;
  const b=DB.blocks(ME.id).find(b=>b.id===curBlk);
  const a=b?DB.athletes(ME.id).find(a=>a.id===b.athId):null;
  const prof=a?.prof||{};
  const al=getAutoLoad(QE[sid].fam,QE[sid].var,QE[sid].rpe,QE[sid].reps,prof);
  // Met à jour seulement le chip de charge auto sans re-render
  const chip=el(`qechip-${sid}`);
  if(chip){
    if(al){
      chip.innerHTML=`<button class="qe-load-chip" onclick="QE['${sid}'].lmin='${al}';qeRefreshLoad('${sid}','${al}')">💡${al}</button>`;
    } else {
      chip.innerHTML='';
    }
  }
  // Met à jour le placeholder de l'input charge
  const loadInp=el(`qeload-${sid}`);
  if(loadInp){loadInp.placeholder=al||'—'}
  // Met à jour le bouton Ajouter (disabled si pas de charge)
  const addBtn=el(`qeaddbtn-${sid}`);
  if(addBtn){addBtn.disabled=!(QE[sid].fam&&QE[sid].var&&(QE[sid].lmin!==''||al))}
}
function qeRefreshLoad(sid,val){
  if(!QE[sid])return;
  QE[sid].lmin=String(val);
  const inp=el(`qeload-${sid}`);if(inp){inp.value=val}
}
function qeAdd(sid){
  const q=QE[sid];if(!q||!q.fam||!q.var)return;
  const b=DB.blocks(ME.id).find(b=>b.id===curBlk);
  const a=b?DB.athletes(ME.id).find(a=>a.id===b.athId):null;
  const prof=a?.prof||{};
  const autoLoad=getAutoLoad(q.fam,q.var,q.rpe,q.reps,prof);
  const lmin=q.lmin!==''?Number(q.lmin):(autoLoad||0);
  if(!lmin){toast('⚠️ Renseigne la charge');return}
  const exs=DB.exs(sid);
  const rest=RPE_R[q.rpe]||120;
  const pres=q.pres||(q.sets===1?'Start':'Cap');
  const payload={
    id:q.editing||uid(),fam:q.fam,var:q.var,sets:q.sets,reps:q.reps,
    rpe:q.rpe,rest,restOvr:false,pres,
    lt:'fixed',lmin,lmax:null,
    order:q.editing?(exs.find(e=>e.id===q.editing)?.order??exs.length):exs.length,
    ovr:false,rpeInc:q.rpeInc||0
  };
  if(q.editing){const i=exs.findIndex(e=>e.id===q.editing);if(i>=0)exs[i]=payload;else exs.push(payload)}
  else exs.push(payload);
  DB.saveEx(sid,exs);
  propagateToFutureWeeks(sid,payload,prof);
  // reset QE pour ce sid
  QE[sid]=defaultQE();
  rSesBody(sid);
  toast(q.editing?'✅ Modifié':'✅ Ajouté');
  setTimeout(()=>{const inp=el(`qeinp-${sid}`);if(inp)inp.focus()},80);
}
function inlineEditEx(eid,sid){
  const exs=DB.exs(sid);const ex=exs.find(e=>e.id===eid);if(!ex)return;
  QE[sid]={q:'',fam:ex.fam,var:ex.var,sets:ex.sets,reps:ex.reps,
    rpe:ex.rpe,lmin:String(ex.lmin),lt:ex.lt,pres:ex.pres||null,
    rpeInc:ex.rpeInc!=null?ex.rpeInc:(DB.struct(curBlk).length>1?0.5:0),editing:eid};
  rSesBody(sid);
  setTimeout(()=>{const inp=el(`qesets-${sid}`);if(inp){inp.focus();inp.select()}},50);
}
function delExInline(eid,sid){
  DB.saveEx(sid,DB.exs(sid).filter(e=>e.id!==eid));
  removeFromFutureWeeks(sid,eid);
  if(QE[sid]?.editing===eid){QE[sid]=defaultQE()}
  rSesBody(sid);toast('Supprimé');
}

// Re-render le corps d'une séance sans toucher au reste de la page
let _sesOpen={};
function toggleSes(sid,wn,sn){
  _sesOpen[sid]=!_sesOpen[sid];
  const body=el(`sesBody-${sid}`);
  const chev=el(`chevses-${sid}`);
  if(body){body.style.display=_sesOpen[sid]===false?'none':''}

}
function rSesBody(sid){
  const b=DB.blocks(ME.id).find(b=>b.id===curBlk);
  const a=b?DB.athletes(ME.id).find(a=>a.id===b.athId):null;
  const prof=a?.prof||{};
  const exs=DB.exs(sid);
  const body=el(`sesBody-${sid}`);if(!body)return;
  body.innerHTML=exs.map(ex=>rExRow(ex,sid,prof)).join('')+rQuickEntry(sid,prof);

  const cnt=body.parentElement?.querySelector('.pgm-ses-count');
  if(cnt)cnt.textContent=exs.length?(exs.length+' ex.'):'Vide';

// Copier une semaine vers la suivante
function copyWeek(wi){
  const str=DB.struct(curBlk);
  if(wi>=str.length-1){toast('⚠️ Pas de semaine suivante');return}
  const src=str[wi],dst=str[wi+1];
  src.sess.forEach(ss=>{
    const exs=DB.exs(ss.id);
    dst.sess.forEach(ds=>{
      if(ds.sn===ss.sn){
        const newExs=exs.map(e=>({...e,id:uid()}));
        DB.saveEx(ds.id,newExs);
      }
    });
  });
  rBlk();toast(`✅ Sem. ${src.wn} → Sem. ${dst.wn}`);
}
