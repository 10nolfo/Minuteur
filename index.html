<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PL Timer" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="manifest.json" />
  <title>IRON SESSION</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e8ff3a;
      --accent2: #ff4c26;
      --text: #f0f0f0;
      --muted: #555;
      --done: #2a3a1a;
      --done-text: #7ecb3f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ── HEADER ── */
    .header {
      padding: 18px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 3px;
      color: var(--accent);
      line-height: 1;
    }
    .header .subtitle {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 1px;
    }
    .btn-icon {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: all .15s;
    }
    .btn-icon:active { transform: scale(0.9); background: var(--border); }

    /* ── NAV TABS ── */
    .nav {
      display: flex;
      padding: 0 20px;
      gap: 6px;
      flex-shrink: 0;
    }
    .nav-tab {
      flex: 1;
      padding: 9px 0;
      text-align: center;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s;
      color: var(--muted);
      background: none;
      border: none;
    }
    .nav-tab.active {
      background: var(--surface2);
      color: var(--accent);
      border: 1px solid var(--border);
    }

    /* ── PAGES ── */
    .page { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .page.active { display: flex; }

    /* ── SCROLLABLE AREA ── */
    .scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      -webkit-overflow-scrolling: touch;
    }
    .scroll::-webkit-scrollbar { display: none; }

    /* ── SETUP PAGE ── */
    .session-input-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .session-input-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .session-name-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 10px 12px;
      margin-bottom: 10px;
      outline: none;
    }
    .session-name-input:focus { border-color: var(--accent); }

    .exercise-entry {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: stretch;
    }
    .ex-fields {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ex-row {
      display: flex;
      gap: 6px;
    }
    .ex-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 9px 10px;
      outline: none;
      transition: border-color .15s;
      -webkit-appearance: none;
    }
    .ex-input:focus { border-color: var(--accent); }
    .ex-input.name { flex: 3; }
    .ex-input.sets { flex: 1; min-width: 0; text-align: center; }
    .ex-input.weight { flex: 2; min-width: 0; }
    .ex-input::placeholder { color: var(--muted); }
    .ex-hint {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;
    }
    .ex-hint-row {
      display: flex;
      gap: 6px;
    }
    .ex-hint-row .hint-cell { flex: 1; }
    .hint-cell.name { flex: 3; }
    .hint-cell.sets { flex: 1; }
    .hint-cell.weight { flex: 2; }

    .btn-remove {
      background: none;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: var(--muted);
      font-size: 18px;
      width: 36px;
      min-width: 36px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      align-self: stretch;
      transition: all .15s;
    }
    .btn-remove:active { color: var(--accent2); border-color: var(--accent2); }

    .btn-add-ex {
      width: 100%;
      background: none;
      border: 1px dashed var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-size: 13px;
      padding: 10px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all .2s;
      margin-top: 4px;
    }
    .btn-add-ex:active { color: var(--accent); border-color: var(--accent); }

    .rest-config {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .rest-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .rest-presets {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .rest-preset {
      flex: 1;
      min-width: 60px;
      padding: 10px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: all .15s;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: var(--muted);
      letter-spacing: 1px;
    }
    .rest-preset span {
      display: block;
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      letter-spacing: 1px;
      margin-top: -2px;
    }
    .rest-preset.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }
    .rest-custom {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }
    .rest-custom input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      text-align: center;
    }
    .rest-custom input:focus { border-color: var(--accent); }
    .rest-custom label { font-size: 12px; color: var(--muted); }

    .btn-start {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 3px;
      padding: 18px;
      cursor: pointer;
      transition: all .15s;
      margin-bottom: 14px;
    }
    .btn-start:active { transform: scale(0.97); }
    .btn-start:disabled { background: var(--border); color: var(--muted); }

    /* ── SESSION PAGE ── */
    .session-header {
      padding: 16px 20px 8px;
      flex-shrink: 0;
    }
    .session-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--text);
    }
    .session-progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 10px;
      overflow: hidden;
    }
    .session-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width .4s ease;
    }

    /* Timer block */
    .timer-block {
      margin: 0 20px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .timer-block::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity .3s;
    }
    .timer-block.running::before { opacity: 1; animation: scanline 1.5s linear infinite; }
    @keyframes scanline {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .timer-status {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .timer-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 72px;
      line-height: 1;
      letter-spacing: 4px;
      color: var(--accent);
      transition: color .3s;
    }
    .timer-display.warning { color: var(--accent2); }

    .timer-ring {
      width: 80px; height: 80px;
      margin: 0 auto 10px;
      display: none;
    }
    .timer-ring.active { display: block; }
    .timer-ring circle {
      fill: none;
      stroke: var(--border);
      stroke-width: 4;
    }
    .timer-ring .progress {
      stroke: var(--accent);
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      transition: stroke-dashoffset .5s linear, stroke .3s;
    }
    .timer-ring .progress.warning { stroke: var(--accent2); }

    .current-exercise {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      color: var(--text);
      margin-bottom: 2px;
    }
    .current-set-info {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .timer-actions {
      display: flex;
      gap: 10px;
      margin: 12px 20px;
      flex-shrink: 0;
    }
    .btn-main {
      flex: 2;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      padding: 16px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-main:active { transform: scale(0.97); }
    .btn-main.danger { background: var(--accent2); color: #fff; }
    .btn-main:disabled { background: var(--border); color: var(--muted); }

    .btn-secondary {
      flex: 1;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 16px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-secondary:active { background: var(--border); }

    /* Exercise list in session */
    .ex-list { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
    .ex-list::-webkit-scrollbar { display: none; }

    .ex-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      transition: all .3s;
    }
    .ex-card.current {
      border-color: var(--accent);
      background: #1a1c0a;
    }
    .ex-card.done {
      border-color: #2a3020;
      background: #111310;
      opacity: 0.5;
    }
    .ex-card-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ex-card-name .badge {
      font-size: 9px;
      letter-spacing: 2px;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .badge-current { background: var(--accent); color: #000; }
    .badge-done { background: var(--done); color: var(--done-text); }
    .badge-next { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    .sets-grid {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .set-dot {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      transition: all .3s;
    }
    .set-dot.done {
      background: var(--done);
      border-color: var(--done-text);
      color: var(--done-text);
    }
    .set-dot.current {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: bold;
    }

    .ex-weight-tag {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    /* ── SAVED SESSIONS PAGE ── */
    .saved-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .saved-empty .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
    .saved-empty p { font-size: 13px; line-height: 1.6; }

    .saved-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all .15s;
      position: relative;
    }
    .saved-card:active { transform: scale(0.98); border-color: var(--accent); }
    .saved-card-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .saved-card-meta {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }
    .saved-card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .btn-load {
      flex: 1;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      padding: 10px;
      cursor: pointer;
    }
    .btn-delete {
      background: none;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      width: 40px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-delete:active { color: var(--accent2); border-color: var(--accent2); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent);
      color: #000;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      padding: 12px 24px;
      border-radius: 40px;
      opacity: 0;
      transition: all .3s;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── COMPLETED OVERLAY ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      display: none;
    }
    .overlay.show { display: flex; }
    .overlay-emoji { font-size: 72px; margin-bottom: 20px; animation: pop .4s ease; }
    @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    .overlay-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 4px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .overlay-sub { font-size: 14px; color: var(--muted); margin-bottom: 40px; }
    .btn-overlay {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      padding: 16px 40px;
      cursor: pointer;
    }

    /* ── DIVIDER ── */
    .section-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      margin-top: 4px;
    }

    /* ── BOTTOM SAFE AREA ── */
    .bottom-pad { height: env(safe-area-inset-bottom, 16px); flex-shrink: 0; }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div>
      <h1>IRON SESSION</h1>
      <div class="subtitle">Powerlifting Timer</div>
    </div>
    <button class="btn-icon" id="btn-save" title="Sauvegarder la séance">💾</button>
  </div>

  <!-- NAV TABS -->
  <div class="nav">
    <button class="nav-tab active" data-page="setup">Séance</button>
    <button class="nav-tab" data-page="session">Entraînement</button>
    <button class="nav-tab" data-page="saved">Sauvegardées</button>
  </div>

  <!-- PAGE: SETUP -->
  <div class="page active" id="page-setup">
    <div class="scroll">

      <div class="session-input-wrap">
        <div class="session-input-label">Nom de la séance</div>
        <input class="session-name-input" id="session-name" placeholder="Ex: Squat / Bench / Dead" maxlength="40" />

        <div class="section-label" style="margin-top:6px">Exercices</div>
        <div id="ex-hint-row" class="ex-hint-row" style="padding: 0 44px 0 0; margin-bottom:4px;">
          <div class="ex-hint hint-cell name">Exercice</div>
          <div class="ex-hint hint-cell sets">Séries</div>
          <div class="ex-hint hint-cell weight">Poids (kg)</div>
        </div>
        <div id="exercise-list"></div>
        <button class="btn-add-ex" id="btn-add-ex">＋ Ajouter un exercice</button>
      </div>

      <div class="rest-config">
        <div class="rest-label">Temps de repos entre chaque série</div>
        <div class="rest-presets" id="rest-presets">
          <div class="rest-preset" data-val="90">1:30<span>Hypertrophie</span></div>
          <div class="rest-preset selected" data-val="180">3:00<span>Force</span></div>
          <div class="rest-preset" data-val="300">5:00<span>Maxi</span></div>
        </div>
        <div class="rest-custom">
          <label>Personnalisé :</label>
          <input type="number" id="rest-custom" placeholder="sec" min="10" max="999" value="180" />
          <label>secondes</label>
        </div>
      </div>

      <button class="btn-start" id="btn-start">▶ LANCER LA SÉANCE</button>

    </div>
  </div>

  <!-- PAGE: SESSION -->
  <div class="page" id="page-session">
    <div class="session-header">
      <div class="session-title" id="session-running-title">SÉANCE EN COURS</div>
      <div class="session-progress-bar">
        <div class="session-progress-fill" id="session-progress" style="width:0%"></div>
      </div>
    </div>

    <!-- Timer -->
    <div class="timer-block" id="timer-block">
      <div class="timer-status" id="timer-status">PRÊT</div>
      <svg class="timer-ring active" id="timer-ring" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="36"/>
        <circle class="progress" id="timer-circle" cx="40" cy="40" r="36"
          stroke-dasharray="226" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-display" id="timer-display">—</div>
      <div class="current-exercise" id="current-ex-name">—</div>
      <div class="current-set-info" id="current-set-info">Appuie sur DÉMARRER pour commencer</div>
    </div>

    <div class="timer-actions">
      <button class="btn-main" id="btn-timer-action">DÉMARRER</button>
      <button class="btn-secondary" id="btn-skip">⏭ Passer</button>
    </div>

    <div class="ex-list" id="session-ex-list"></div>
    <div class="bottom-pad"></div>
  </div>

  <!-- PAGE: SAVED -->
  <div class="page" id="page-saved">
    <div class="scroll" id="saved-scroll">
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- COMPLETED OVERLAY -->
  <div class="overlay" id="overlay-done">
    <div class="overlay-emoji">🏋️</div>
    <div class="overlay-title">SÉANCE TERMINÉE</div>
    <div class="overlay-sub" id="overlay-sub">Bravo, tu as tout écrasé !</div>
    <button class="btn-overlay" id="btn-overlay-done">NOUVELLE SÉANCE</button>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let exercises = [];     // [{name, sets, weight}]
let restSeconds = 180;
let sessionName = '';

// Session runtime
let sessionActive = false;
let flatSeries = [];    // [{exIndex, setIndex, name, weight}]
let currentIdx = 0;     // which set we're on
let timerInterval = null;
let timerRemaining = 0;
let timerTotal = 0;
let timerPhase = 'idle'; // 'rest' | 'idle'

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  addExercise();
  addExercise();
  renderSavedSessions();

  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('page-' + tab.dataset.page).classList.add('active');
    });
  });

  document.getElementById('btn-add-ex').addEventListener('click', addExercise);
  document.getElementById('btn-start').addEventListener('click', startSession);
  document.getElementById('btn-timer-action').addEventListener('click', handleTimerAction);
  document.getElementById('btn-skip').addEventListener('click', skipSet);
  document.getElementById('btn-save').addEventListener('click', saveSession);
  document.getElementById('btn-overlay-done').addEventListener('click', resetAll);

  document.querySelectorAll('.rest-preset').forEach(p => {
    p.addEventListener('click', () => {
      document.querySelectorAll('.rest-preset').forEach(x => x.classList.remove('selected'));
      p.classList.add('selected');
      restSeconds = parseInt(p.dataset.val);
      document.getElementById('rest-custom').value = restSeconds;
    });
  });

  document.getElementById('rest-custom').addEventListener('input', (e) => {
    restSeconds = Math.max(10, parseInt(e.target.value) || 60);
    document.querySelectorAll('.rest-preset').forEach(p => {
      p.classList.toggle('selected', parseInt(p.dataset.val) === restSeconds);
    });
  });

  document.getElementById('session-name').addEventListener('input', e => {
    sessionName = e.target.value;
  });
});

// ─────────────────────────────────────────────
//  EXERCISES SETUP
// ─────────────────────────────────────────────
function addExercise(name='', sets=4, weight='') {
  const id = Date.now() + Math.random();
  exercises.push({ id, name, sets, weight });
  renderExercises();
}

function removeExercise(id) {
  exercises = exercises.filter(e => e.id !== id);
  renderExercises();
}

function renderExercises() {
  const list = document.getElementById('exercise-list');
  list.innerHTML = '';
  exercises.forEach((ex, i) => {
    const div = document.createElement('div');
    div.className = 'exercise-entry';
    div.innerHTML = `
      <div class="ex-fields">
        <div class="ex-row">
          <input class="ex-input name" placeholder="Squat, Bench, Deadlift…"
            value="${ex.name}" data-id="${ex.id}" data-field="name" />
          <input class="ex-input sets" type="number" placeholder="4" min="1" max="20"
            value="${ex.sets}" data-id="${ex.id}" data-field="sets" />
          <input class="ex-input weight" placeholder="kg" type="number" min="0"
            value="${ex.weight}" data-id="${ex.id}" data-field="weight" />
        </div>
      </div>
      <button class="btn-remove" data-id="${ex.id}">×</button>
    `;
    list.appendChild(div);
  });

  list.querySelectorAll('.ex-input').forEach(input => {
    input.addEventListener('input', e => {
      const id = parseFloat(e.target.dataset.id);
      const field = e.target.dataset.field;
      const ex = exercises.find(x => x.id === id);
      if (ex) ex[field] = field === 'sets' ? Math.max(1, parseInt(e.target.value)||1) : e.target.value;
    });
  });

  list.querySelectorAll('.btn-remove').forEach(btn => {
    btn.addEventListener('click', e => removeExercise(parseFloat(e.target.dataset.id)));
  });
}

// ─────────────────────────────────────────────
//  START SESSION
// ─────────────────────────────────────────────
function startSession() {
  const valid = exercises.filter(e => e.name.trim());
  if (!valid.length) { showToast('Ajoute au moins un exercice !'); return; }

  // Build flat series list
  flatSeries = [];
  valid.forEach((ex, exIdx) => {
    const s = Math.max(1, parseInt(ex.sets) || 1);
    for (let i = 0; i < s; i++) {
      flatSeries.push({ exIndex: exIdx, setIndex: i, name: ex.name.trim(), weight: ex.weight, totalSets: s });
    }
  });

  currentIdx = 0;
  sessionActive = true;
  timerPhase = 'idle';

  document.getElementById('session-running-title').textContent =
    sessionName.trim() || 'SÉANCE EN COURS';

  // Switch to session tab
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-page="session"]').classList.add('active');
  document.getElementById('page-session').classList.add('active');

  updateSessionUI();
}

// ─────────────────────────────────────────────
//  TIMER LOGIC
// ─────────────────────────────────────────────
function handleTimerAction() {
  if (!sessionActive) return;

  if (timerPhase === 'idle') {
    // Mark current set as done
    completeCurrentSet();
  } else if (timerPhase === 'rest') {
    // Stop rest early → ready for next
    stopTimer();
    timerPhase = 'idle';
    updateSessionUI();
  }
}

function completeCurrentSet() {
  if (currentIdx >= flatSeries.length) return;
  currentIdx++;
  updateProgress();

  if (currentIdx >= flatSeries.length) {
    // All done!
    stopTimer();
    setTimeout(showCompleted, 400);
    return;
  }

  // Start rest timer
  startRestTimer();
}

function startRestTimer() {
  timerPhase = 'rest';
  timerRemaining = restSeconds;
  timerTotal = restSeconds;

  stopTimer();
  document.getElementById('timer-block').classList.add('running');
  updateTimerDisplay();
  updateSessionUI();

  timerInterval = setInterval(() => {
    timerRemaining--;
    updateTimerDisplay();
    if (timerRemaining <= 0) {
      stopTimer();
      timerPhase = 'idle';
      updateSessionUI();
      vibrateDevice([200, 100, 200]);
      showToast('REPOS TERMINÉ — EN PISTE !');
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('timer-block').classList.remove('running');
}

function skipSet() {
  if (!sessionActive) return;
  if (timerPhase === 'rest') {
    stopTimer();
    timerPhase = 'idle';
    updateSessionUI();
  } else {
    completeCurrentSet();
  }
}

function updateTimerDisplay() {
  const m = Math.floor(timerRemaining / 60);
  const s = timerRemaining % 60;
  const str = `${m}:${s.toString().padStart(2,'0')}`;
  const disp = document.getElementById('timer-display');
  disp.textContent = str;
  disp.classList.toggle('warning', timerRemaining <= 10);

  // Circle
  const circ = 226;
  const frac = timerTotal > 0 ? timerRemaining / timerTotal : 0;
  const offset = circ - circ * frac;
  const circle = document.getElementById('timer-circle');
  circle.style.strokeDashoffset = offset;
  circle.classList.toggle('warning', timerRemaining <= 10);
}

// ─────────────────────────────────────────────
//  UI UPDATES
// ─────────────────────────────────────────────
function updateSessionUI() {
  const ring = document.getElementById('timer-ring');
  const display = document.getElementById('timer-display');
  const status = document.getElementById('timer-status');
  const exName = document.getElementById('current-ex-name');
  const setInfo = document.getElementById('current-set-info');
  const btnAction = document.getElementById('btn-timer-action');

  if (currentIdx >= flatSeries.length) {
    exName.textContent = 'TERMINÉ';
    setInfo.textContent = 'Séance complète 🏆';
    btnAction.textContent = 'TERMINÉ';
    btnAction.disabled = true;
    return;
  }

  const cur = flatSeries[currentIdx];

  if (timerPhase === 'rest') {
    status.textContent = 'REPOS';
    ring.classList.add('active');
    exName.textContent = cur.name;
    setInfo.textContent = `Prochaine série : ${cur.setIndex + 1} / ${cur.totalSets}${cur.weight ? ' — ' + cur.weight + ' kg' : ''}`;
    btnAction.textContent = 'PASSER LE REPOS';
    btnAction.className = 'btn-main danger';
    btnAction.disabled = false;
  } else {
    status.textContent = 'À FAIRE';
    ring.classList.remove('active');
    display.textContent = '—';
    const circle = document.getElementById('timer-circle');
    circle.style.strokeDashoffset = 226;
    exName.textContent = cur.name;
    setInfo.textContent = `Série ${cur.setIndex + 1} / ${cur.totalSets}${cur.weight ? ' — ' + cur.weight + ' kg' : ''}`;
    btnAction.textContent = 'SÉRIE TERMINÉE ✓';
    btnAction.className = 'btn-main';
    btnAction.disabled = false;
  }

  renderSessionExList();
}

function updateProgress() {
  const pct = Math.round((currentIdx / flatSeries.length) * 100);
  document.getElementById('session-progress').style.width = pct + '%';
  renderSessionExList();
}

function renderSessionExList() {
  const container = document.getElementById('session-ex-list');
  container.innerHTML = '';

  // Group by exercise
  const exGroups = {};
  flatSeries.forEach((s, idx) => {
    const key = s.name + '|' + s.totalSets;
    if (!exGroups[key]) exGroups[key] = { name: s.name, weight: s.weight, total: s.totalSets, indices: [] };
    exGroups[key].indices.push(idx);
  });

  Object.values(exGroups).forEach(group => {
    const firstIdx = group.indices[0];
    const lastIdx = group.indices[group.indices.length - 1];
    const allDone = lastIdx < currentIdx;
    const isCurrent = firstIdx <= currentIdx && currentIdx <= lastIdx;

    const card = document.createElement('div');
    card.className = 'ex-card' + (allDone ? ' done' : isCurrent ? ' current' : '');

    let badge = '';
    if (allDone) badge = '<span class="badge badge-done">✓ FAIT</span>';
    else if (isCurrent) badge = '<span class="badge badge-current">EN COURS</span>';
    else badge = '<span class="badge badge-next">À VENIR</span>';

    let dots = '';
    group.indices.forEach((globalIdx, localSetIdx) => {
      const done = globalIdx < currentIdx;
      const cur = globalIdx === currentIdx;
      dots += `<div class="set-dot ${done ? 'done' : cur ? 'current' : ''}">${done ? '✓' : localSetIdx + 1}</div>`;
    });

    card.innerHTML = `
      <div class="ex-card-name">${group.name} ${badge}</div>
      ${group.weight ? `<div class="ex-weight-tag">${group.weight} kg</div>` : ''}
      <div class="sets-grid">${dots}</div>
    `;
    container.appendChild(card);
  });
}

// ─────────────────────────────────────────────
//  SAVE / LOAD
// ─────────────────────────────────────────────
function saveSession() {
  const valid = exercises.filter(e => e.name.trim());
  if (!valid.length) { showToast('Rien à sauvegarder !'); return; }
  const name = sessionName.trim() || 'Séance ' + new Date().toLocaleDateString('fr-FR');
  const sessions = getSavedSessions();
  const entry = {
    id: Date.now(),
    name,
    restSeconds,
    exercises: valid.map(e => ({ name: e.name, sets: e.sets, weight: e.weight })),
    savedAt: new Date().toISOString()
  };
  sessions.push(entry);
  localStorage.setItem('iron_sessions', JSON.stringify(sessions));
  showToast('Séance sauvegardée 💾');
  renderSavedSessions();
}

function getSavedSessions() {
  try { return JSON.parse(localStorage.getItem('iron_sessions')) || []; }
  catch { return []; }
}

function renderSavedSessions() {
  const scroll = document.getElementById('saved-scroll');
  const sessions = getSavedSessions();
  scroll.innerHTML = '';

  if (!sessions.length) {
    scroll.innerHTML = `<div class="saved-empty">
      <div class="icon">📋</div>
      <p>Aucune séance sauvegardée.<br>Crée ta première séance et appuie sur 💾 pour la garder.</p>
    </div>`;
    return;
  }

  sessions.slice().reverse().forEach(s => {
    const card = document.createElement('div');
    card.className = 'saved-card';
    const d = new Date(s.savedAt);
    const dateStr = d.toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' });
    const totalSets = s.exercises.reduce((a, e) => a + (parseInt(e.sets)||1), 0);
    card.innerHTML = `
      <div class="saved-card-name">${s.name}</div>
      <div class="saved-card-meta">${s.exercises.length} exercice${s.exercises.length>1?'s':''} · ${totalSets} séries · Repos ${s.restSeconds}s · ${dateStr}</div>
      <div class="saved-card-actions">
        <button class="btn-load" data-id="${s.id}">▶ CHARGER</button>
        <button class="btn-delete" data-id="${s.id}">🗑</button>
      </div>
    `;
    scroll.appendChild(card);
  });

  scroll.querySelectorAll('.btn-load').forEach(btn => {
    btn.addEventListener('click', e => loadSession(parseInt(e.target.dataset.id)));
  });
  scroll.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', e => deleteSession(parseInt(e.target.dataset.id)));
  });
}

function loadSession(id) {
  const sessions = getSavedSessions();
  const s = sessions.find(x => x.id === id);
  if (!s) return;

  exercises = s.exercises.map((e, i) => ({ ...e, id: Date.now() + i }));
  restSeconds = s.restSeconds;
  sessionName = s.name;
  document.getElementById('session-name').value = s.name;
  document.getElementById('rest-custom').value = s.restSeconds;
  document.querySelectorAll('.rest-preset').forEach(p => {
    p.classList.toggle('selected', parseInt(p.dataset.val) === s.restSeconds);
  });
  renderExercises();

  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-page="setup"]').classList.add('active');
  document.getElementById('page-setup').classList.add('active');

  showToast('Séance chargée ✓');
}

function deleteSession(id) {
  let sessions = getSavedSessions().filter(s => s.id !== id);
  localStorage.setItem('iron_sessions', JSON.stringify(sessions));
  renderSavedSessions();
  showToast('Séance supprimée');
}

// ─────────────────────────────────────────────
//  COMPLETED
// ─────────────────────────────────────────────
function showCompleted() {
  const total = flatSeries.length;
  document.getElementById('overlay-sub').textContent =
    `${total} série${total > 1 ? 's' : ''} réalisée${total > 1 ? 's' : ''} — c'est du solide ! 💪`;
  document.getElementById('overlay-done').classList.add('show');
  vibrateDevice([300, 100, 300, 100, 500]);
}

function resetAll() {
  document.getElementById('overlay-done').classList.remove('show');
  sessionActive = false;
  stopTimer();
  timerPhase = 'idle';
  currentIdx = 0;
  flatSeries = [];

  // Reset session tab UI
  document.getElementById('timer-status').textContent = 'PRÊT';
  document.getElementById('timer-display').textContent = '—';
  document.getElementById('current-ex-name').textContent = '—';
  document.getElementById('current-set-info').textContent = 'Appuie sur DÉMARRER pour commencer';
  document.getElementById('btn-timer-action').textContent = 'DÉMARRER';
  document.getElementById('btn-timer-action').disabled = false;
  document.getElementById('session-progress').style.width = '0%';
  document.getElementById('session-ex-list').innerHTML = '';

  // Go back to setup
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-page="setup"]').classList.add('active');
  document.getElementById('page-setup').classList.add('active');
}

// ─────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function vibrateDevice(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch(e) {}
}
</script>
</body>
</html>
